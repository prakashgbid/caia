# chiefaia-site Secret TEMPLATE — DO NOT `kubectl apply` this file as-is.
#
# It documents the shape of the Secret the Deployment expects under
# `envFrom: secretRef: name: chiefaia-site-secrets`. The Deployment
# marks the secretRef `optional: true` so the pod boots without it —
# the marketing site has no hard runtime dependency on any secret
# today. Create the real Secret only when /api/contact is wired to a
# real forms provider.
#
# Provisioning paths (operator picks one):
#   1. Infisical sync (preferred — see infra/infisical/ docs).
#   2. Manual: `kubectl create secret generic chiefaia-site-secrets \
#        --namespace chiefaia \
#        --from-literal=CONTACT_FORM_PROVIDER_API_KEY=<value>`
#   3. Sealed Secrets (if the cluster ever adopts them).
#
# Never commit real Secret values to this file.
apiVersion: v1
kind: Secret
metadata:
  name: chiefaia-site-secrets
  namespace: chiefaia
  labels:
    app.kubernetes.io/name: chiefaia-web
    app.kubernetes.io/instance: chiefaia-site
    app.kubernetes.io/part-of: chiefaia
  annotations:
    app.chiefaia.io/template: "true"
    app.chiefaia.io/source: "infra/chiefaia-site/40-secret-template.yaml"
type: Opaque
stringData:
  # Reserved for when /api/contact moves off its current stub. Today
  # the route just validates payload shape and 200s — no provider call.
  CONTACT_FORM_PROVIDER_API_KEY: "REPLACE_ME"
