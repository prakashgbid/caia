# Grafana admin password — TEMPLATE ONLY.
#
# DO NOT commit a real password to git. The live Secret is created
# out-of-band with a random 32-char value:
#
#     ADMIN_PW=$(openssl rand -base64 24 | tr -d '=+/' | head -c 32)
#     kubectl -n chiefaia create secret generic grafana-admin \
#       --from-literal=admin-password="$ADMIN_PW"
#     echo "Save this in Infisical: $ADMIN_PW"
#
# The actual password is then stored in Infisical under
# `chiefaia/grafana/admin-password` for operator retrieval.
#
# This template exists so the secret schema is documented in-tree and
# so a fresh cluster can be bootstrapped by editing the placeholder
# below and applying. Cloudflare Access is the primary authentication
# layer; admin/password is a break-glass for in-cluster port-forward
# debugging.
apiVersion: v1
kind: Secret
metadata:
  name: grafana-admin
  namespace: chiefaia
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: caia-observability
type: Opaque
stringData:
  # REPLACE before applying. Never commit a real value.
  admin-password: "REPLACE_ME_WITH_A_RANDOM_VALUE"
