# Grafana provisioning — datasources, dashboard provider, dashboards JSON.
#
# Phase C2 deliverable (Tempo + 3 trace dashboards) extended in Phase
# C8 with the Prometheus datasource and the SLO compliance dashboard.
# Single ConfigMap holds:
#   - datasources.yaml            → Tempo (uid: tempo) + Prometheus (uid: prometheus)
#   - dashboards.yaml             → file provider pointing at
#                                    /var/lib/grafana/dashboards
#   - caia-traces.json            → service-wide trace health
#   - caia-wizard-flow.json       → wizard step breakdown
#   - caia-claude-calls.json      → @chiefaia/claude-spawner panel
#   - caia-slo-compliance.json    → SLO burn-rate + error budget + firing alerts
#
# The Deployment mounts each key at the path Grafana expects via
# explicit `items:` in 10-deployment.yaml. Editing any dashboard
# JSON in `dashboards/` requires regenerating this file —
# `scripts/grafana-configmap-gen.py` rebuilds it from the source
# JSON in that directory.
#
# Source of truth is the JSON in infra/grafana/dashboards/.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-config
  namespace: chiefaia
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: caia-observability
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Tempo
        type: tempo
        uid: tempo
        access: proxy
        url: http://tempo.chiefaia.svc.cluster.local:3200
        isDefault: true
        editable: false
        jsonData:
          httpMethod: GET
          serviceMap:
            datasourceUid: tempo
          search:
            hide: false
          nodeGraph:
            enabled: true
          tracesToLogs:
            datasourceUid: ""
      - name: Prometheus
        type: prometheus
        uid: prometheus
        access: proxy
        url: http://prometheus.chiefaia.svc.cluster.local:9090
        isDefault: false
        editable: false
        jsonData:
          httpMethod: GET
          timeInterval: 30s
          manageAlerts: false
          alertmanagerUid: alertmanager
      - name: Alertmanager
        type: alertmanager
        uid: alertmanager
        access: proxy
        url: http://alertmanager.chiefaia.svc.cluster.local:9093
        isDefault: false
        editable: false
        jsonData:
          implementation: prometheus
          handleGrafanaManagedAlerts: false
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: caia
        orgId: 1
        folder: CAIA
        folderUid: caia
        type: file
        disableDeletion: true
        editable: false
        allowUiUpdates: false
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards
          foldersFromFilesStructure: false
  caia-traces.json: |
    {
      "annotations": {
        "list": [
          {
            "builtIn": 1,
            "datasource": { "type": "grafana", "uid": "-- Grafana --" },
            "enable": true,
            "hide": true,
            "iconColor": "rgba(0, 211, 255, 1)",
            "name": "Annotations & Alerts",
            "type": "dashboard"
          }
        ]
      },
      "description": "Phase C2 — service-wide trace health for the chiefaia spine: P95 latency, error rate, top slow spans. Sourced from Tempo.",
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "datasource": { "type": "tempo", "uid": "tempo" },
          "description": "P95 span duration in the last 1h, grouped by resource.service.name. Backed by TraceQL metrics over Tempo's local blocks.",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisBorderShow": false,
                "axisCenteredZero": false,
                "axisColorMode": "text",
                "axisLabel": "p95 duration",
                "axisPlacement": "auto",
                "barAlignment": 0,
                "drawStyle": "line",
                "fillOpacity": 10,
                "gradientMode": "none",
                "hideFrom": { "legend": false, "tooltip": false, "viz": false },
                "lineInterpolation": "linear",
                "lineWidth": 2,
                "pointSize": 5,
                "scaleDistribution": { "type": "linear" },
                "showPoints": "auto",
                "spanNulls": false,
                "stacking": { "group": "A", "mode": "none" },
                "thresholdsStyle": { "mode": "off" }
              },
              "mappings": [],
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] },
              "unit": "ns"
            },
            "overrides": []
          },
          "gridPos": { "h": 9, "w": 24, "x": 0, "y": 0 },
          "id": 1,
          "options": {
            "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            {
              "datasource": { "type": "tempo", "uid": "tempo" },
              "queryType": "traceqlMetrics",
              "query": "{ resource.service.name=~\"chiefaia-.+\" } | quantile_over_time(duration, .95) by (resource.service.name)",
              "refId": "A"
            }
          ],
          "title": "P95 latency per service",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "tempo", "uid": "tempo" },
          "description": "Rate of spans with status_code = error, per resource.service.name, in the last 1h.",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "axisLabel": "error rate (spans/s)",
                "drawStyle": "line",
                "fillOpacity": 10,
                "lineInterpolation": "linear",
                "lineWidth": 2,
                "pointSize": 5,
                "showPoints": "auto",
                "spanNulls": false,
                "stacking": { "group": "A", "mode": "none" }
              },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 0.1 }
                ]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "gridPos": { "h": 9, "w": 12, "x": 0, "y": 9 },
          "id": 2,
          "options": {
            "legend": { "calcs": ["mean", "max"], "displayMode": "table", "placement": "bottom", "showLegend": true },
            "tooltip": { "mode": "multi", "sort": "desc" }
          },
          "targets": [
            {
              "datasource": { "type": "tempo", "uid": "tempo" },
              "queryType": "traceqlMetrics",
              "query": "{ resource.service.name=~\"chiefaia-.+\" && status = error } | rate() by (resource.service.name)",
              "refId": "A"
            }
          ],
          "title": "Error rate per service",
          "type": "timeseries"
        },
        {
          "datasource": { "type": "tempo", "uid": "tempo" },
          "description": "Top 10 slowest spans in the last 1h across chiefaia-dashboard, chiefaia-wizard, chiefaia-site.",
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "custom": { "align": "auto", "cellOptions": { "type": "auto" }, "filterable": true, "inspect": false },
              "mappings": [],
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Duration" },
                "properties": [
                  { "id": "unit", "value": "ns" },
                  { "id": "custom.cellOptions", "value": { "mode": "gradient", "type": "color-background" } }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "Trace ID" },
                "properties": [{ "id": "custom.width", "value": 280 }]
              }
            ]
          },
          "gridPos": { "h": 9, "w": 12, "x": 12, "y": 9 },
          "id": 3,
          "options": {
            "cellHeight": "sm",
            "footer": { "countRows": false, "fields": "", "reducer": ["sum"], "show": false },
            "showHeader": true,
            "sortBy": [{ "desc": true, "displayName": "Duration" }]
          },
          "targets": [
            {
              "datasource": { "type": "tempo", "uid": "tempo" },
              "queryType": "traceql",
              "query": "{ resource.service.name=~\"chiefaia-.+\" } | by(resource.service.name) | select(duration)",
              "limit": 10,
              "tableType": "traces",
              "refId": "A"
            }
          ],
          "title": "Top 10 slowest spans (1h)",
          "type": "table"
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": ["caia", "tempo", "observability"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "timepicker": {},
      "timezone": "",
      "title": "CAIA Traces",
      "uid": "caia-traces",
      "version": 1,
      "weekStart": ""
    }
