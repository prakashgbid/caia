# Grafana Deployment — single replica, OSS image, non-root.
#
# Phase C2 deliverable. Pairs with Tempo (PR #608) as the visualisation
# half of CAIA's trace spine. Prometheus is deliberately NOT pulled in
# here — Phase C8 handles metrics. The Tempo data source is the only
# one provisioned at boot.
#
# Single replica because:
#   - SQLite backend (default Grafana persistence) does not support
#     multi-writer access.
#   - Dashboards are static (provisioned from ConfigMap); user state
#     is admin-only — there is no multi-user demand for HA.
#   - Migrating to Postgres + N replicas is a Phase C8+ concern.
#
# Runs as non-root (uid 472, Grafana's container default) with a
# read-only root filesystem and an emptyDir tmp mount. Persistent
# state (SQLite, plugins) lives in the 5Gi PVC from 50-pvc.yaml.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: chiefaia
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: caia-observability
spec:
  replicas: 1
  strategy:
    type: Recreate          # SQLite + ReadWriteOnce PVC → no rolling
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana
        app.kubernetes.io/part-of: caia-observability
        # Required by `chiefaia/allow-ingress-from-tunnel` NetworkPolicy — pods
        # exposed via the Cloudflare tunnel + Istio gateway must carry this label
        # for cross-ns ingress from istio-system to land. Same convention as
        # chiefaia-api / chiefaia-wizard / chiefaia-web / chiefaia-dashboard.
        net.chiefaia.io/exposed-via: tunnel
      annotations:
        # Force pod restart when datasource/dashboard ConfigMap changes.
        checksum/config: "c2-2026-05-30"
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 472
        runAsGroup: 472
        fsGroup: 472
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: grafana
          image: grafana/grafana-oss:10.4.3
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-admin
                  key: admin-password
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            - name: GF_USERS_AUTO_ASSIGN_ORG
              value: "true"
            - name: GF_USERS_AUTO_ASSIGN_ORG_ROLE
              value: "Viewer"
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "false"
            - name: GF_SERVER_ROOT_URL
              value: "https://grafana.chiefaia.com"
            - name: GF_SERVER_SERVE_FROM_SUB_PATH
              value: "false"
            - name: GF_ANALYTICS_REPORTING_ENABLED
              value: "false"
            - name: GF_ANALYTICS_CHECK_FOR_UPDATES
              value: "false"
            - name: GF_LOG_LEVEL
              value: "info"
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: storage
              mountPath: /var/lib/grafana
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
              readOnly: true
            - name: dashboards-provider
              mountPath: /etc/grafana/provisioning/dashboards
              readOnly: true
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
              readOnly: true
            - name: tmp
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: grafana-data
        - name: datasources
          configMap:
            name: grafana-config
            items:
              - key: datasources.yaml
                path: datasources.yaml
        - name: dashboards-provider
          configMap:
            name: grafana-config
            items:
              - key: dashboards.yaml
                path: dashboards.yaml
        - name: dashboards
          configMap:
            name: grafana-config
            items:
              - key: caia-traces.json
                path: caia-traces.json
              - key: caia-wizard-flow.json
                path: caia-wizard-flow.json
              - key: caia-claude-calls.json
                path: caia-claude-calls.json
        - name: tmp
          emptyDir:
            sizeLimit: 128Mi
