# alertmanager-webhook-receiver — translates Alertmanager webhook
# fires into structured INBOX entries on a PVC.
#
# Implementation note: we run the stock `python:3.12-alpine` image
# and mount the receiver source (infra/prometheus/webhook-receiver/main.py)
# from a ConfigMap (63-configmap-webhook-receiver-code.yaml). This
# avoids needing to publish a custom container image to a registry
# the cluster can pull from — appropriate for V1 where the receiver
# is a single stdlib-only Python file.
#
# When we add dependencies (e.g. structured logging, OTLP traces,
# metrics), promote to a published image and switch back to a
# pre-built tag.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager-webhook-receiver
  namespace: chiefaia
  labels:
    app.kubernetes.io/name: alertmanager-webhook-receiver
    app.kubernetes.io/part-of: caia-observability
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: alertmanager-webhook-receiver
  template:
    metadata:
      labels:
        app.kubernetes.io/name: alertmanager-webhook-receiver
        app.kubernetes.io/part-of: caia-observability
      annotations:
        checksum/code: "c8-2026-05-30"
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: receiver
          image: python:3.12-alpine
          imagePullPolicy: IfNotPresent
          command: ["python", "/code/main.py"]
          env:
            - name: INBOX_PATH
              value: /inbox/INBOX.md
            - name: LISTEN_PORT
              value: "8080"
            - name: LOG_LEVEL
              value: INFO
            - name: PYTHONUNBUFFERED
              value: "1"
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - name: code
              mountPath: /code
              readOnly: true
            - name: inbox
              mountPath: /inbox
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: code
          configMap:
            name: alertmanager-webhook-receiver-code
            defaultMode: 0o555
            items:
              - key: main.py
                path: main.py
        - name: inbox
          persistentVolumeClaim:
            claimName: alertmanager-inbox
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager-webhook-receiver
  namespace: chiefaia
  labels:
    app.kubernetes.io/name: alertmanager-webhook-receiver
    app.kubernetes.io/part-of: caia-observability
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: alertmanager-webhook-receiver
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: alertmanager-inbox
  namespace: chiefaia
  labels:
    app.kubernetes.io/name: alertmanager-webhook-receiver
    app.kubernetes.io/part-of: caia-observability
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
