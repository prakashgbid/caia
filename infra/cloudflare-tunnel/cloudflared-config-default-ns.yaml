# Desired-state mirror of the in-cluster ConfigMap `default/cloudflared-config`.
#
# Status (2026-05-25): NOT mounted into the running Deployment.
#   The `stolution-infra/cloudflared` Deployment currently uses `--token`
#   (Cloudflare remote-managed ingress). This file documents what the
#   ConfigMap holds today and what the cloudflared Deployment should
#   consume once it is reverted to `--config` mode. See README.md for
#   the migration path.
#
# Chiefaia routes use the in-cluster DNS form, which becomes the active
# routing path the moment the Deployment mounts this ConfigMap and drops
# hostNetwork.
apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflared-config
  namespace: default
  labels:
    app: cloudflared
data:
  config.yml: |
    tunnel: 3cf7eece-1e16-4dbe-8460-a127b8e9d238
    metrics: 0.0.0.0:2000
    no-autoupdate: true

    ingress:
      # =====================================================
      # K8s services routed through Istio IngressGateway
      # =====================================================

      # Production sites
      - hostname: stolution.com
        service: http://istio-ingressgateway.istio-system.svc.cluster.local:80
      - hostname: www.stolution.com
        service: http://istio-ingressgateway.istio-system.svc.cluster.local:80
      - hostname: api.stolution.com
        service: http://istio-ingressgateway.istio-system.svc.cluster.local:80

      # ArgoCD
