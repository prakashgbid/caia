# Tempo configuration — V1.
#
# Monolithic mode (single-binary, no microservices split). Receivers
# accept OTLP-HTTP on :4318 and OTLP-gRPC on :4317. The query API
# (used for verification by `curl /api/traces/<id>`) is exposed on
# :3200. Storage backend is local — adequate for spine traces at
# current volume; revisit when retention pressure builds.
#
# Sampling = 1.0 (everything) for V1 per operator decision dated
# 2026-05-25. Drop to 0.1 once Tempo ingester memory or local disk
# usage stays above 70% for a week. Sampling lives in
# @chiefaia/tracing's `initTracing()`, not here — the collector
# accepts whatever it's sent.
apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo
  namespace: chiefaia
  labels:
    app.kubernetes.io/name: tempo
    app.kubernetes.io/part-of: caia-observability
data:
  tempo.yaml: |
    server:
      http_listen_port: 3200
      grpc_listen_port: 9095
      log_level: info
    distributor:
      receivers:
        otlp:
          protocols:
            http:
              endpoint: 0.0.0.0:4318
            grpc:
              endpoint: 0.0.0.0:4317
    ingester:
      lifecycler:
        ring:
          replication_factor: 1
      trace_idle_period: 10s
      max_block_bytes: 1048576
      max_block_duration: 5m
    compactor:
      compaction:
        block_retention: 168h        # 7 days
        compacted_block_retention: 1h
    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/traces
        wal:
          path: /var/tempo/wal
    overrides:
      defaults:
        ingestion:
          rate_limit_bytes: 20000000   # 20 MB/s — comfy headroom over current spine volume
          burst_size_bytes: 30000000
        global:
          max_bytes_per_trace: 5000000
        # Phase C8 — enable the span-metrics processor for the default
        # tenant. Tempo's metrics generator emits span-derived series
        # (traces_spanmetrics_*) that back the SLO recording rules in
        # infra/prometheus/50-configmap-prometheus.yaml.
        metrics_generator:
          processors: [span-metrics]
    metrics_generator:
      registry:
        external_labels:
          source: tempo
      storage:
        path: /var/tempo/generator/wal
        # Phase C8 — remote_write span-metrics into the new Prometheus.
        # The receiver endpoint is enabled by the
        # `--web.enable-remote-write-receiver` flag on the Prometheus
        # Deployment (infra/prometheus/10-deployment-prometheus.yaml).
        remote_write:
          - url: http://prometheus.chiefaia.svc.cluster.local:9090/api/v1/write
            send_exemplars: true
      processor:
        span_metrics:
          # Buckets tuned to the wizard SLO (500ms) and claude.spawn
          # SLO (30s) — the explicit small-value buckets give
          # histogram_quantile accuracy on the wizard side without
          # over-resolving the long-tail claude side.
          histogram_buckets: [0.05, 0.1, 0.25, 0.5, 0.75, 1, 2, 5, 10, 20, 30, 60]
          dimensions:
            - service.name
            - span.name
            - status.code
            - span.kind
