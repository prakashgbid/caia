# chiefaia-wizard ConfigMap — NON-SECRET runtime env.
#
# Secret values (DB URL, Infisical admin token, NATS NKey seed,
# EDGE_SHARED_SECRET) live in the chiefaia-wizard-secrets Secret
# managed out-of-band by the operator or Infisical operator.
#
# Changes to this ConfigMap require a pod restart — handled by bumping
# the `checksum/config` annotation in 10-deployment.yaml when you apply.
apiVersion: v1
kind: ConfigMap
metadata:
  name: chiefaia-wizard-config
  namespace: chiefaia
  labels:
    app.kubernetes.io/name: chiefaia-wizard
    app.kubernetes.io/part-of: chiefaia
data:
  # ─── Runtime ────────────────────────────────────────────────────
  NODE_ENV: "production"
  NEXT_TELEMETRY_DISABLED: "1"
  PORT: "3000"
  HOSTNAME: "0.0.0.0"

  # ─── Tracing (@chiefaia/tracing) ────────────────────────────────
  # OTLP-HTTP receiver on the in-cluster Tempo. Read by
  # `initTracing` in apps/wizard/instrumentation.ts.
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://tempo.chiefaia.svc.cluster.local:4318"

  # ─── Event bus (@chiefaia/event-bus-nats) ───────────────────────
  # Empty string = no event types routed to NATS yet (V1 default).
  # Wave 1a flips this to a real list when ops are ready.
  BUS_BACKEND_NATS_FOR_EVENT_TYPES: ""

  # NATS connection settings. Auth NKey lives in the Secret; the rest
  # are non-sensitive cluster coordinates.
  NATS_SERVERS: "nats://nats.chiefaia.svc.cluster.local:4222"
  NATS_STREAM: "chiefaia-events"
  NATS_SUBJECT_PREFIX: "chiefaia"
  NATS_DURABLE: "chiefaia-wizard"
  NATS_MONITOR_URL: "http://nats.chiefaia.svc.cluster.local:8222/healthz"

  # ─── Infisical (self-hosted) ────────────────────────────────────
  # Base URL is public; admin token lives in the Secret.
  INFISICAL_BASE_URL: "https://infisical.chiefaia.com"
  INFISICAL_ORG_ID: ""    # populated by operator when the org is provisioned

  # ─── Cloudflare Access ──────────────────────────────────────────
  # The middleware verifies CF Access JWTs via the public JWKS.
  # CF_ACCESS_AUD lives in the Secret alongside the real bearer tokens
  # to avoid noise from secret-scanning heuristics.
  CF_ACCESS_TEAM_DOMAIN: "chiefaia.cloudflareaccess.com"

  # ─── Wizard auth mode (see apps/wizard/lib/auth/edge-bypass.ts) ─
  # Three modes:
  #
  #   cloudflare    (default) — strict JWT, redirect /sign-in on miss.
  #   cf-edge-only             — defence-in-depth bypass: requires Cf-Ray
  #                              header (CF-injected) + Cf-Connecting-Ip
  #                              ∈ BYPASS_ALLOWED_IPS + a constant-time
  #                              match on X-Caia-Edge-Token vs the
  #                              EDGE_SHARED_SECRET in the K8s Secret.
  #                              Any failure → falls through to strict JWT.
  #   disabled                 — no-op (NEVER set in production).
  #
  # Operator note: cf-edge-only is the live mode now so the operator's
  # allowlisted Mac IP can reach dashboard.chiefaia.com without the
  # browser carrying a CF_Authorization cookie. Cloudflare Access still
  # gates everyone ELSE at the edge.
  WIZARD_AUTH_MODE: "cf-edge-only"
  BYPASS_ALLOWED_IPS: "69.118.44.175"
  BYPASS_TENANT_EMAIL: "prakash.stolution@gmail.com"
