# chiefaia-wizard Secret — TEMPLATE ONLY.
#
# DO NOT apply this file as-is in production. The real values come
# from one of:
#
#   (preferred) The Infisical operator syncs the secret from the
#               `chiefaia-platform` workspace into this name. See
#               infra/infisical/ for the InfisicalSecret CRD that
#               drives this — when that lands, REMOVE this template.
#
#   (fallback)  Operator runs `kubectl create secret generic` directly:
#
#                 kubectl create secret generic chiefaia-wizard-secrets \
#                   --namespace chiefaia \
#                   --from-literal=GLOBAL_POSTGRES_URL='<...>' \
#                   --from-literal=INFISICAL_ADMIN_TOKEN='<...>' \
#                   --from-literal=NATS_NKEY_SEED='<...>' \
#                   --from-literal=CF_ACCESS_AUD='<application-aud>'
#
# The keys below are the contract the wizard reads at runtime —
# update lib/tenants/wire.ts (or lib/auth/cf-access.ts for CF_*) if
# you rename any.
apiVersion: v1
kind: Secret
metadata:
  name: chiefaia-wizard-secrets
  namespace: chiefaia
  labels:
    app.kubernetes.io/name: chiefaia-wizard
    app.kubernetes.io/part-of: chiefaia
    # Marker so the operator can spot the placeholder before flipping
    # to the real value. Real Secret should NOT carry this label.
    chiefaia.io/placeholder: "true"
type: Opaque
stringData:
  # Postgres connection string for the global `tenants` table.
  # Format: postgres://user:pass@host:5432/db?sslmode=require
  GLOBAL_POSTGRES_URL: "REPLACE_ME"

  # Infisical admin bearer for workspace provisioning. Distinct from
  # any per-tenant token. Scope: workspace.create on the
  # `chiefaia-platform` org.
  INFISICAL_ADMIN_TOKEN: "REPLACE_ME"

  # Per-app NATS NKey seed — issued by the NATS operator.
  # @chiefaia/event-bus-nats reads this and authenticates as the
  # `chiefaia-wizard` durable consumer.
  NATS_NKEY_SEED: "REPLACE_ME"

  # Cloudflare Access Application UUID (the `aud` claim the JWT
  # middleware verifies against). Not a secret per Cloudflare's docs,
  # but kept here so secret-scanning heuristics don't false-positive
  # on the literal UUID in the ConfigMap.
  CF_ACCESS_AUD: "REPLACE_ME"
