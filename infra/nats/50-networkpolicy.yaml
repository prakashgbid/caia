apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: nats-allow-chiefaia
  labels:
    app.kubernetes.io/name: nats
    app.kubernetes.io/component: networkpolicy
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: nats
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow pods in chiefaia namespace to talk to the broker
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: chiefaia
      ports:
        - protocol: TCP
          port: 4222
        - protocol: TCP
          port: 8222
    # Allow NATS pods to cluster with each other
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: nats
      ports:
        - protocol: TCP
          port: 6222
        - protocol: TCP
          port: 4222
  egress:
    # NATS pods need to reach each other for clustering
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: nats
      ports:
        - protocol: TCP
          port: 6222
        - protocol: TCP
          port: 4222
    # DNS
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
