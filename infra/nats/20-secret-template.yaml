# PLACEHOLDER ONLY — operator must replace with real NKeys.
#
# This file documents the expected shape of the nats-nkeys Secret.
# DO NOT apply this file in production — it contains a dummy
# resolver.conf that allows no users. Generate real keys per
# 00-namespace-note.md and apply with `kubectl create secret`.
#
# Apply only for local/dev to validate the manifest set.
apiVersion: v1
kind: Secret
metadata:
  name: nats-nkeys
  labels:
    app.kubernetes.io/name: nats
    app.kubernetes.io/component: auth
    chiefaia.dev/placeholder: "true"
type: Opaque
stringData:
  resolver.conf: |
    # Replace with operator-generated entries:
    #
    # operator: <operator-pubkey>
    # resolver: MEMORY
    # resolver_preload {
    #   <account-pubkey>: "<signed-jwt>"
    # }
    #
    # For dev only — no authorized users:
    authorization {
      users: []
    }
