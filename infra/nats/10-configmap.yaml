apiVersion: v1
kind: ConfigMap
metadata:
  name: nats-config
  labels:
    app.kubernetes.io/name: nats
    app.kubernetes.io/component: broker
    app.kubernetes.io/part-of: chiefaia
data:
  nats-server.conf: |
    # NATS JetStream — chiefaia inter-agent broker
    # Spec: research/inter_agent_communication_protocol_2026.md §4.7

    server_name: $POD_NAME
    listen: 0.0.0.0:4222
    http: 0.0.0.0:8222

    # ─── JetStream ───────────────────────────────────────────────
    jetstream {
      domain: "chiefaia"
      store_dir: "/data/jetstream"
      max_memory_store: 1GB
      max_file_store:   8GB
    }

    # ─── Cluster ─────────────────────────────────────────────────
    cluster {
      name: "chiefaia-nats"
      listen: 0.0.0.0:6222
      routes: [
        "nats://nats-0.nats-headless.chiefaia.svc.cluster.local:6222"
        "nats://nats-1.nats-headless.chiefaia.svc.cluster.local:6222"
        "nats://nats-2.nats-headless.chiefaia.svc.cluster.local:6222"
      ]
      connect_retries: 30
    }

    # ─── TLS ─────────────────────────────────────────────────────
    tls {
      cert_file: "/etc/nats/tls/tls.crt"
      key_file:  "/etc/nats/tls/tls.key"
      ca_file:   "/etc/nats/tls/ca.crt"
      verify_and_map: false
      timeout: 3
    }

    # ─── Authorization (NKeys) ───────────────────────────────────
    # The included resolver/auth file is mounted from the
    # nats-nkeys Secret. Operator generates real keys per the
    # runbook; this manifest only declares the path.
    include "/etc/nats/auth/resolver.conf"

    # ─── Limits ──────────────────────────────────────────────────
    max_connections: 1024
    max_subscriptions: 4096
    max_payload: 1MB
    write_deadline: "10s"

    # ─── Logging ─────────────────────────────────────────────────
    debug: false
    trace: false
    logtime: true
