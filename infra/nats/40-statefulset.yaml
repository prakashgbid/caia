apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nats
  labels:
    app.kubernetes.io/name: nats
    app.kubernetes.io/component: broker
    app.kubernetes.io/part-of: chiefaia
spec:
  serviceName: nats-headless
  replicas: 3
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app.kubernetes.io/name: nats
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nats
        app.kubernetes.io/component: broker
    spec:
      terminationGracePeriodSeconds: 60
      # PodSecurity "restricted" compliance.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: nats
                topologyKey: kubernetes.io/hostname
      containers:
        - name: nats
          image: nats:2.10-alpine
          imagePullPolicy: IfNotPresent
          # Container-level securityContext for restricted PSA + semgrep.
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop: ["ALL"]
          args:
            - "--config"
            - "/etc/nats/config/nats-server.conf"
          ports:
            - name: client
              containerPort: 4222
            - name: cluster
              containerPort: 6222
            - name: monitor
              containerPort: 8222
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          volumeMounts:
            - name: config
              mountPath: /etc/nats/config
              readOnly: true
            - name: auth
              mountPath: /etc/nats/auth
              readOnly: true
            - name: tls
              mountPath: /etc/nats/tls
              readOnly: true
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
            - name: var-run
              mountPath: /var/run/nats
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8222
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8222
            initialDelaySeconds: 15
            periodSeconds: 15
          lifecycle:
            preStop:
              exec:
                command: ["/nats-server", "-sl=ldm=/var/run/nats/nats.pid"]
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1
              memory: 1Gi
      volumes:
        - name: config
          configMap:
            name: nats-config
        - name: auth
          secret:
            secretName: nats-nkeys
        - name: tls
          secret:
            secretName: nats-tls
            optional: true   # allow boot before cert-manager issues
        - name: tmp
          emptyDir: {}
        - name: var-run
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
