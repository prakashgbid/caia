version: "1"
events:
  # Pipeline lifecycle
  - type: pipeline.started
    severity: info
    actor: [user, executor, ci]
    payload: [project_slug, trigger]

  - type: pipeline.completed
    severity: info
    actor: [user, executor, ci]
    payload: [project_slug, trigger, duration_ms, outcome]

  - type: pipeline.failed
    severity: error
    actor: [user, executor, ci]
    payload: [project_slug, trigger, duration_ms, error]

  - type: pipeline.decompose_started
    severity: info
    actor: [story-decomposer, user]
    payload: [story_id, project_slug]

  - type: pipeline.decompose_completed
    severity: info
    actor: [story-decomposer]
    payload: [story_id, children_count]

  - type: pipeline.stage.advanced
    severity: info
    actor: [executor, system, user]
    payload: [promptId, stage, entityKind, entityId, durationFromStartMs]

  # Story events
  - type: story.created
    severity: info
    actor: [user, story-decomposer, api]
    payload: [story_id, title, kind, project_slug]

  - type: story.updated
    severity: info
    actor: [user, executor, api]
    payload: [story_id, fields_changed]

  - type: story.status_changed
    severity: info
    actor: [executor, user, api]
    payload: [story_id, from_status, to_status]

  - type: story.deleted
    severity: warning
    actor: [user, api]
    payload: [story_id]

  # FREG-003 — story completion → feature_registry write hook.
  # Fired when a story reaches its terminal verified/done state. The
  # FeatureRegistryWriter subscriber catches this, synthesizes a registry
  # row, embeds the description via Ollama, and upserts. Until Phase 2
  # actually ships stories, the only emitter is the API endpoint that
  # PATCHes a story's status to verified.
  - type: story.completed
    severity: info
    actor: [executor, api, worker]
    payload: [story_id, project_slug, status, completed_at]

  # FREG-003 — observability for registry writes (story.completed → upsert).
  - type: feature.registry.upserted
    severity: info
    actor: [feature-registry-writer]
    payload: [feature_id, project, source, story_id, dedup_key, embedding_model, latency_ms]

  # FREG-006 — observability for the PO Agent's lifecycle classification
  # when the top match falls in the 0.78-0.85 grey zone (PO sets enhance
  # but flags for human/BA review).
  - type: feature.classification.uncertain
    severity: warning
    actor: [po-agent]
    payload: [story_id, top_match_id, top_score, threshold_used, project]

  # FREG-006 — observability for the PO Agent's lifecycle classification
  # when the registry/embedder is unavailable (PO defaults to lifecycle='new').
  - type: feature.classification.skipped
    severity: warning
    actor: [po-agent]
    payload: [story_id, reason]

  # Task events
  - type: task.created
    severity: info
    actor: [user, executor, api]
    payload: [task_id, title, project_slug, domain_slug]

  - type: task.queued
    severity: info
    actor: [executor, user]
    payload: [task_id]

  - type: task.started
    severity: info
    actor: [executor]
    payload: [task_id, worker_pid, worktree_path]

  - type: task.completed
    severity: info
    actor: [executor]
    payload: [task_id, duration_ms, result_summary]

  - type: task.failed
    severity: error
    actor: [executor]
    payload: [task_id, failure_reason, attempt_n]

  - type: task.paused
    severity: warning
    actor: [executor, user]
    payload: [task_id, pause_reason]

  - type: task.resumed
    severity: info
    actor: [user]
    payload: [task_id]

  - type: task.status_changed
    severity: info
    actor: [executor, user, api]
    payload: [task_id, from_status, to_status]

  # Executor events
  - type: executor.started
    severity: info
    actor: [system]
    payload: [pid, max_concurrent, poll_interval_ms]

  - type: executor.stopped
    severity: info
    actor: [system, user]
    payload: [pid, reason]

  - type: executor.config_changed
    severity: info
    actor: [user, api]
    payload: [fields_changed]

  - type: executor.circuit_opened
    severity: error
    actor: [executor]
    payload: [domain_slug, failure_count, threshold]

  - type: executor.circuit_closed
    severity: info
    actor: [executor]
    payload: [domain_slug]

  - type: executor.heartbeat
    severity: debug
    actor: [executor]
    payload: [pid, active_workers, queued_tasks]

  - type: executor.task.picked_up
    severity: info
    actor: [executor]
    payload: [taskId, taskRunId, rootPromptId, executorPid, worktreePath]

  - type: executor.claude.tool_call
    severity: debug
    actor: [executor]
    payload: [taskRunId, toolName, inputSummary, durationMs, sequenceIndex]

  - type: executor.claude.completed
    severity: info
    actor: [executor]
    payload: [taskRunId, taskId, rootPromptId, exitCode, inputTokens, outputTokens, filesChanged, toolCallCount, durationMs]

  - type: executor.task.failed
    severity: error
    actor: [executor]
    payload: [taskRunId, taskId, rootPromptId, error, retryCount, circuitBreakerTripped]

  # Worker events
  - type: worker.spawned
    severity: info
    actor: [executor]
    payload: [executor_run_id, task_id, pid, worktree_path]

  - type: worker.completed
    severity: info
    actor: [executor]
    payload: [executor_run_id, task_id, exit_code, turn_count]

  - type: worker.failed
    severity: error
    actor: [executor]
    payload: [executor_run_id, task_id, exit_code, failure_reason]

  - type: worker.timed_out
    severity: error
    actor: [executor]
    payload: [executor_run_id, task_id, max_turns]

  # Behavior test events
  - type: behavior_test.registered
    severity: info
    actor: [api, ci]
    payload: [test_id, story_id, test_path]

  - type: behavior_test.passed
    severity: info
    actor: [ci, behavior-runner]
    payload: [test_id, duration_ms]

  - type: behavior_test.failed
    severity: error
    actor: [ci, behavior-runner]
    payload: [test_id, failure_message, duration_ms]

  # Completeness sentinel events
  - type: completeness.run_started
    severity: info
    actor: [completeness-sentinel]
    payload: [entity_kind, entity_id, checks_total]

  - type: completeness.run_completed
    severity: info
    actor: [completeness-sentinel]
    payload: [run_id, score_pct, checks_passed, checks_total]

  - type: completeness.finding_filed
    severity: warning
    actor: [completeness-sentinel]
    payload: [run_id, entity_id, finding_code, severity]

  - type: completeness.check.completed
    severity: info
    actor: [completeness-sentinel]
    payload: [taskId, taskRunId, rootPromptId, passed, findingCount, criticalCount, score]

  # Backup events
  - type: backup.started
    severity: info
    actor: [db-backup]
    payload: [backup_path, trigger]

  - type: backup.completed
    severity: info
    actor: [db-backup]
    payload: [backup_path, size_bytes, duration_ms]

  - type: backup.failed
    severity: error
    actor: [db-backup]
    payload: [backup_path, error]

  # User events
  - type: user.action
    severity: info
    actor: [user]
    payload: [action, entity_type, entity_id]

  # System events
  - type: system.startup
    severity: info
    actor: [system]
    payload: [component, version, port]

  - type: system.shutdown
    severity: info
    actor: [system]
    payload: [component, reason]

  - type: system.error
    severity: error
    actor: [system]
    payload: [component, error, stack]

  # Domain events
  - type: domain.created
    severity: info
    actor: [user, api]
    payload: [domain_slug, name]

  - type: domain.updated
    severity: info
    actor: [user, api]
    payload: [domain_slug, fields_changed]

  # Lock events
  - type: lock.acquired
    severity: debug
    actor: [executor, worker]
    payload: [lock_name, holder, ttl_ms]

  - type: lock.released
    severity: debug
    actor: [executor, worker]
    payload: [lock_name, holder]

  - type: lock.expired
    severity: warning
    actor: [system]
    payload: [lock_name, holder]

  # Build events
  - type: build.started
    severity: info
    actor: [ci, user, executor]
    payload: [build_run_id, trigger, git_sha, branch, changed_files]

  - type: build.step_started
    severity: info
    actor: [build-runner]
    payload: [build_run_id, build_step_id, step_name, command]

  - type: build.step_completed
    severity: info
    actor: [build-runner]
    payload: [build_run_id, build_step_id, step_name, exit_code, duration_ms]

  - type: build.step_failed
    severity: error
    actor: [build-runner]
    payload: [build_run_id, build_step_id, step_name, exit_code, stderr_tail, error_signature]

  - type: build.completed
    severity: info
    actor: [build-runner]
    payload: [build_run_id, outcome, duration_ms, steps_total, steps_failed]

  - type: build.aborted
    severity: warning
    actor: [build-runner, user]
    payload: [build_run_id, reason, completed_steps]

  # Prompt traceability events (migration 0010)
  - type: prompt.received
    severity: info
    actor: [user, api, mcp, executor]
    payload: [prompt_id, received_via, session_id, hash]

  - type: prompt.status_changed
    severity: info
    actor: [user, api, mcp, executor]
    payload: [prompt_id, from_status, to_status, elapsed_ms]

  - type: prompt.ingested
    severity: info
    actor: [user, api, mcp, executor]
    payload: [promptId, text, projectId, source]

  # Requirement events
  - type: requirement.state.transitioned
    severity: info
    actor: [executor, user, api, system]
    payload: [requirementId, rootPromptId, fromState, toState, reason]

  # Priority engine events
  - type: priority.scored
    severity: info
    actor: [prioritizer, system]
    payload: [task_id, score, bucket, rationale_summary]

  - type: priority.rebucketed
    severity: info
    actor: [prioritizer, system]
    payload: [task_id, old_bucket, new_bucket, score]

  - type: priority.reordered
    severity: info
    actor: [prioritizer, system]
    payload: [task_id, old_ordinal, new_ordinal, bucket]

  - type: priority.user_override
    severity: info
    actor: [user, api]
    payload: [task_id, old_ordinal, new_ordinal, override_reason]

  # System decisions (autonomous authority log)
  - type: system.decision_made
    severity: info
    actor: [system, prioritizer]
    payload: [component, decision, rationale]

  # Secrets broker events
  - type: secret.fetched
    severity: info
    actor: [secrets-broker]
    payload: [secret_key_hash, caller_module, site_slug, ttl_sec, cached]

  - type: secret.cache_hit
    severity: debug
    actor: [secrets-broker]
    payload: [secret_key_hash, caller_module, site_slug, ttl_remaining_sec]

  - type: secret.rotation_triggered
    severity: info
    actor: [secrets-broker, user]
    payload: [secret_key_hash, site_slug, triggered_by]

  - type: secret.rotated
    severity: info
    actor: [secrets-broker]
    payload: [secret_key_hash, site_slug, duration_ms]

  - type: secret.access_denied
    severity: warning
    actor: [secrets-broker]
    payload: [secret_key_hash, caller_ip, reason]

  - type: secret.fetch_failed
    severity: error
    actor: [secrets-broker]
    payload: [secret_key_hash, caller_module, error]

  # Scaffolder agent events
  - type: scaffolder.team.assembled
    severity: info
    actor: [api]
    payload: [promptId, requestType, agentsActivated, correlationId, projectId]

  # PO Agent events (migration 0019)
  - type: po-agent.decomposition.complete
    severity: info
    actor: [po-agent]
    payload: [promptId, correlationId, requirementsCreated, storiesCreated, totalNodes, summary, primaryDomain]

  # BA Agent events (migration 0018)
  - type: ba-agent.enrichment.complete
    severity: info
    actor: [ba-agent]
    payload: [promptId, correlationId, enrichedStories, storiesWithAcceptanceCriteria, ticketsValid, ticketsInvalid]

  # BA cross-agent collaboration protocol (migration 0022)
  - type: ba-agent.input-requested
    severity: info
    actor: [ba-agent]
    payload: [promptId, correlationId, storyId, requestingAgent, requestedFrom, deadlineMs]

  - type: ba-agent.input-received
    severity: info
    actor: [ba-agent]
    payload: [promptId, correlationId, storyId, repliesReceived, repliesTimedOut]

  # Task Scheduler Agent events (migration 0018)
  - type: task-scheduler.scheduling.complete
    severity: info
    actor: [task-scheduler]
    payload: [promptId, correlationId, totalTasks, sequentialCount, parallelBucketCount, estimatedWallclockHours, sequentialBucketsCreated, parallelBucketSize]

  # Task Scheduler bucket placement (migration 0021)
  - type: task-scheduler.bucket-placed
    severity: info
    actor: [task-scheduler]
    payload: [promptId, correlationId, storyId, bucketId, bucketKind, domainSlug, positionInBucket]

  # Ticket state machine (migration 0021 ticket_template lifecycle)
  - type: ticket.draft
    severity: info
    actor: [po-agent]
    payload: [storyId, promptId, correlationId, requirementId]

  - type: ticket.po-decomposed
    severity: info
    actor: [po-agent]
    payload: [storyId, promptId, correlationId, requirementsCreated]

  - type: ticket.ba-enriching
    severity: info
    actor: [ba-agent]
    payload: [storyId, promptId, correlationId]

  - type: ticket.ba-complete
    severity: info
    actor: [ba-agent]
    payload: [storyId, promptId, correlationId, validationStatus, sectionsPopulated]

  - type: ticket.ready-for-pickup
    severity: info
    actor: [task-scheduler]
    payload: [storyId, promptId, correlationId, bucketId, bucketKind]

  # Story-driven testing framework — Phase A (TEST-003)
  - type: test.cases_generated
    severity: info
    actor: [testing-agent]
    payload: [storyId, promptId, correlationId, totalCases, categoryCounts, durationMs]

  - type: test.case_added
    severity: info
    actor: [testing-agent]
    payload: [storyId, promptId, correlationId, testCaseId, category, layer]

  # Story Validator Agent — Phase A (VAL-003)
  - type: story.validation_started
    severity: info
    actor: [story-validator]
    payload: [storyId, promptId, correlationId, attemptNumber, rubricVersion]

  - type: story.validation_passed
    severity: info
    actor: [story-validator]
    payload: [storyId, promptId, correlationId, attemptNumber, score, durationMs, judgeProvider]

  - type: story.validation_failed
    severity: warning
    actor: [story-validator]
    payload: [storyId, promptId, correlationId, attemptNumber, score, failedCheckCount, nextAction, durationMs]

  - type: story.validation_escalated
    severity: error
    actor: [story-validator]
    payload: [storyId, promptId, correlationId, attemptNumber, blockerId]

  # Ticket-state machine extensions for the Validator gate.
  - type: ticket.validating
    severity: info
    actor: [story-validator]
    payload: [storyId, promptId, correlationId, attemptNumber]

  - type: ticket.validated
    severity: info
    actor: [story-validator]
    payload: [storyId, promptId, correlationId, score, judgeProvider]

  # Phase 2 worker-pool lifecycle (TASKMGR-002)
  - type: worker.registered
    severity: info
    actor: [worker]
    payload: [workerId, kind, capabilities, registeredAt]

  - type: worker.heartbeat
    severity: debug
    actor: [worker]
    payload: [workerId, status, currentStoryId, ts]

  - type: worker.released
    severity: info
    actor: [worker]
    payload: [workerId, lastStoryId, releasedAt, reason]

  - type: worker.crashed
    severity: error
    actor: [task-scheduler]
    payload: [workerId, lastStoryId, error, lastHeartbeatAt, ts]

  # Phase 2 task assignment (TASKMGR-003)
  - type: task.assigned
    severity: info
    actor: [task-scheduler]
    payload: [storyId, workerId, bucketId, assignedAt, correlationId]

  # Phase 2 backpressure (TASKMGR-004)
  - type: task-scheduler.backpressure.engaged
    severity: warning
    actor: [task-scheduler]
    payload: [bucketId, queueDepth, ceiling, ts]

  - type: task-scheduler.backpressure.released
    severity: info
    actor: [task-scheduler]
    payload: [bucketId, queueDepth, ts]

  # Phase 2 bucket health metrics (TASKMGR-005)
  - type: task-scheduler.bucket.health
    severity: debug
    actor: [task-scheduler]
    payload: [bucketId, queueDepth, throughputPerHour, oldestReadyAgeS, workersAssigned, engaged, ts]

  # HARDEN-003 — worktree reaper
  - type: worktree.reaped
    severity: info
    actor: [system]
    payload: [storyId, path, reason, ts]
