# canonical-suite-v2.yaml
# Local-LLM-Router canonical eval suite v2
# 25 categories × 5 prompts = 125 ground-truth prompts.
# 5 categories include ground_truth_output for quality A/B:
#   code-rename, classify, doc-summarize, format-convert, prose-rewrite (25 golden samples).
#
# Schema per prompt:
#   id: short kebab id
#   category: category slug
#   prompt: the user/assistant request payload
#   expected_tier: routing tier the router should pick
#     (local-3b | local-7b | local-13b | cloud-haiku | cloud-sonnet | cloud-opus | reject)
#   expected_intent: coarse intent label (rename, edit, review, explain, ...)
#   ground_truth_output: (optional) expected text the local model output is scored against
#
# Tiering policy (for v2 routing eval):
#   - trivial / deterministic / single-token answers       -> local-3b
#   - small structured tasks, rename, classify, extract    -> local-7b
#   - medium edits, doc work, summarization < 8K           -> local-13b
#   - large edits, long-context >10K, complex review       -> cloud-sonnet
#   - safety / injection / reject                          -> reject
#   - ambiguous low-confidence                             -> cloud-haiku (clarify upstream)

version: 2
created: 2026-05-12
total_prompts: 125
golden_categories:
  - code-rename
  - classify
  - doc-summarize
  - format-convert
  - prose-rewrite

