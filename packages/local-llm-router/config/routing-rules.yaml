# Routing rules + intent taxonomy for classifier v2.
#
# Externalized from src/classifier.ts so the taxonomy + thresholds can evolve
# without code changes. Consumed by src/classifier-v2.ts at module load time.
#
# Schema:
#   version:                       integer  (currently 2)
#   default_confidence_threshold:  float    (intent confidence below this -> abstain/escalate)
#   escalation_threshold:          float    (below this -> needs_escalation=true)
#   cascade_thresholds:            map of tier->confidence required to STAY at tier
#   intents:                       list of { name, default_tier, keywords[], min_confidence }
#   tier_order:                    ordered ladder used for cascade routing
#
# Editing notes:
#   - Keep the YAML strictly two-space indented; the loader is a minimal hand-rolled
#     parser scoped to this file's shape (no anchors, flow-style, or multi-line scalars).
#   - Intent names must match the Intent union in classifier-v2.ts.

version: 2
default_confidence_threshold: 0.5
escalation_threshold: 0.35

# Each tier has a minimum confidence the classifier must report to STAY at that tier.
# Below that, the cascade promotes to the next tier in tier_order.
# Lowered local-7b from 0.6 -> 0.5 per SPS T2 P3 plan (give 7B more rope before promoting).
cascade_thresholds:
  local-7b: 0.5
  local-14b: 0.5
  local-32b: 0.45
  claude: 0.0
  stolution-batch: 0.5

# Ladder used by the cascade controller when promoting/escalating a request.
# The classifier returns next_tier = the next entry strictly after the recommended tier.
tier_order:
  - local-7b
  - local-14b
  - local-32b
  - stolution-batch
  - claude

# GB-12 (2026-05-15): per-tier model + timeout mapping.
# Previously the tier→model relationship lived in code comments only; the runtime
# had no way to pick which ollama tag to dispatch to per intent. This block
# externalises it so the router daemon can resolve {tier, intent} → {model, timeout_ms}
# without a code change for tag rotations.
#
# `timeout_ms` is the per-request CPU latency budget — set deliberately high for
# stolution-batch (5 min) because the host is CPU-bound and would otherwise time
# out on legitimately long completions; it also protects against accidental
# interactive routing falling onto this tier (no caller waiting 5 min in a UI).
#
# `default_model` is used when no `per_intent` override applies.
# `per_intent` maps an intent name → ollama tag served by that tier.
tier_models:
  stolution-batch:
    timeout_ms: 300000
    default_model: llama3.3:70b
    per_intent:
      batch-summarize: qwen2.5-coder:14b
      corpus-distill: qwen2.5-coder:14b
      long-context-reason: qwen2.5-coder:32b
      research-synthesis: llama3.3:70b
      complex-review: llama3.3:70b
      embedding-generate: nomic-embed-text

# Intent taxonomy. The `keywords` field powers the lightweight rule-based prepass
# in classifier-v2 — if a task spec contains ≥1 keyword for exactly one intent, we
# skip the LLM call entirely and emit that intent at confidence 0.92.
#
# Tier-to-model mapping (router / model-catalog, not this file):
#   local-7b        → qwen2.5:7b-instruct (general) / qwen2.5-coder:7b (code)
#   local-14b       → qwen2.5-coder:14b
#   local-32b       → qwen2.5-coder:32b / qwen2.5:32b-instruct
#   stolution-batch → see `tier_models` block above for per-intent mapping (GB-12)
#   claude          → cloud escalation
intents:
  - name: classify
    default_tier: local-7b
    min_confidence: 0.55
    # SPS T2.5 Phase 5 (2026-05-16): broaden the keyword set with the very
    # specific multi-word phrases used by the canonical-eval classify
    # category. These prompts enumerate the label list inline (rename,
    # explain, summarize, ...) which collides with single-word keywords on
    # other intents — the prepass specificity tie-breaker added in
    # classifier-v2.ts then picks `classify` because the multi-word phrase
    # dominates by >=1.5x in length and is >=3 tokens. Closes 5 of the 8
    # abstains observed in routing_v2_eval_results_2026-05-16_postpatch.json.
    keywords:
      - classify
      - categorize
      - label
      - tag
      - classify the intent
      - which category
      - classify the intent of this user message
      - classify the intent of this user message into one of
      - reply with only the label

  - name: summarize
    default_tier: local-7b
    min_confidence: 0.55
    keywords:
      - summarize
      - summarise
      - summary
      - tldr
      - tl;dr
      - condense
      - one-line summary
      - resume

  - name: doc-summarize
    default_tier: local-7b
