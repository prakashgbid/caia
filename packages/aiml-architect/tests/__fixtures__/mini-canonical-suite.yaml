description: 'fixture mini canonical suite — covers a handful of task categories'
version: 1
maintainer: 'fixture'

defaultTest:
  vars:
    agent: caia-canonical
  assert:
    - type: javascript
      value: 'output.length > 10'

tests:
  - description: 'domain-classification: classify auth domain'
    vars:
      taskCategory: domain-classification
      prompt: 'Add OAuth2 PKCE login.'
    assert:
      - type: contains
        value: 'auth'

  - description: 'domain-classification: classify ui domain'
    vars:
      taskCategory: domain-classification
      prompt: 'Build a button component.'
    assert:
      - type: contains
        value: 'ui'

  - description: 'domain-classification: classify api domain'
    vars:
      taskCategory: domain-classification
      prompt: 'Expose a /health endpoint.'
    assert:
      - type: contains
        value: 'api'

  - description: 'commit-message: simple bug fix'
    vars:
      taskCategory: commit-message
      prompt: 'Diff: removes a stray semicolon.'
    assert:
      - type: regex
        value: '^fix(\(.*\))?:'
