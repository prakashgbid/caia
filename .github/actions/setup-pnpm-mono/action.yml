name: setup-pnpm-mono
description: Cached pnpm install for the CAIA monorepo (one-shot, shared across jobs in workflow)

# Composite action that consolidates the standard pnpm + node + cache + install
# pattern repeated across every CI workflow.
#
# Replaces five copies of the following block in evidence-gate.yml plus one in
# ci.yml + others:
#
#     - uses: pnpm/action-setup@v4
#     - uses: actions/setup-node@v4
#       with:
#         node-version: 20
#         cache: pnpm
#     - run: pnpm install --frozen-lockfile
#
# Caching strategy
# ----------------
# We rely SOLELY on `actions/setup-node@v4`'s built-in `cache: pnpm` to cache
# `~/.pnpm-store` keyed on `pnpm-lock.yaml`. Combined with `pnpm install
# --prefer-offline`, an unchanged lockfile rebuilds the workspace
# `node_modules/` trees in seconds from the local store with no network
# fetches.
#
# Why we do NOT additionally cache `**/node_modules`
# --------------------------------------------------
# pnpm builds `node_modules/` as a forest of symlinks AND uses hardlinks
# liberally across nested package `node_modules/.bin/` entries (a single
# binary file may have 50+ hardlinked names across different packages'
# bin folders).
#
# `actions/cache@v4` archives this tree with `tar`, which encodes
# duplicate-inode files as hardlink entries. On RESTORE, `tar` extracts
# entries in archive order; a hardlink whose target hasn't been written
# yet fails with `Cannot hard link to '<path>': No such file or
# directory`. This is a fundamental incompatibility — symlinks pointing
# at `.pnpm/<pkg>/node_modules/<pkg>` plus cross-package hardlinks make
# the tree non-restorable in tar's serial pass. Restore fails on the
# first such hardlink and cascades into "Cannot mkdir: File exists" on
# every subsequent dir whose parent is now a broken symlink, blocking
# every downstream job (Build, typecheck, lint, test, semgrep, etc).
#
# Symptom in the failing run (run 25612091911 on PR #404):
#   tar: apps/executor/node_modules/@chiefaia/logger/.../bin/eslint:
#        Cannot hard link to 'apps/executor/.../@chiefaia/capability-broker/
#        .../bin/eslint': No such file or directory
#
# Pure pnpm-store caching avoids this entirely: the store contains plain
# files (no hardlinks across package roots), and `pnpm install --offline`
# re-creates the workspace symlinks/hardlinks fresh on each run.
#
# Reference: velocity-acceleration-strategy-2026-05-06.md §1.2 (Tier 1.2), §A.3.
# Reference: ci_fix_setup_pnpm_mono_2026-05-09.md (this fix).

inputs:
  node-version:
    description: 'Node.js version to install'
    required: false
    default: '20'

runs:
  using: composite
  steps:
    - name: Set up pnpm
      uses: pnpm/action-setup@v4

    - name: Set up Node.js (with built-in pnpm-store cache)
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: pnpm

    - name: Install dependencies (frozen lockfile, prefer offline)
      shell: bash
      run: pnpm install --frozen-lockfile --prefer-offline
