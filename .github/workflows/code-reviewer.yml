name: Code Reviewer

# Runs the @chiefaia/code-reviewer agent on PR open + push, posts the review
# verdict as a PR comment, and submits the PR review (approve / request-changes)
# via the GitHub API. Together with the Architecture/Security Reviewer
# (Ollama-based, Phase 5 of PR Review Pipeline Campaign) this fulfills the
# two-AI-reviewer setup described in operator_decisions_2026-05-08.md.
#
# This workflow is the BLOCKING reviewer for correctness/bugs/style/types/
# tests/naming/comments. The advisory @chiefaia/reviewer agent is sibling
# but never blocks (its review-comment workflow is non-gating).
#
# Subscription-only: never sets ANTHROPIC_API_KEY in the spawn env. The
# CLAUDE_OAUTH_TOKEN secret authenticates the `claude` binary via the
# operator's Max subscription accounts.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main, develop]

# Skip drafts unless explicitly invoked.
concurrency:
  group: code-reviewer-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  detect-changes:
    name: detect-changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - '**'
              - '!**/*.md'
              - '!**/*.mdx'
              - '!docs/**'
              - '!agent/memory/**'
              - '!AGENTS.md'
              - '!CHANGELOG.md'
              - '!.changeset/**'

  code-review:
    name: Code Reviewer (blocking)
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.code == 'true' &&
      !github.event.pull_request.draft
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-pnpm-mono

      - name: Build code-reviewer
        run: pnpm --filter '@chiefaia/code-reviewer...' build

      - name: Fetch PR diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr diff ${{ github.event.pull_request.number }} > /tmp/pr.diff
          echo "Diff size: $(wc -c < /tmp/pr.diff) bytes"

      - name: Run code-reviewer
        env:
          # Subscription-only auth — the binary picks up CLAUDE_OAUTH_TOKEN
          # and routes through the operator's Max account, no API-key billing.
          # Per `feedback_no_api_key_billing.md`: ANTHROPIC_API_KEY is
          # explicitly NOT set; the agent's spawn env strips any inherited copy.
          CLAUDE_OAUTH_TOKEN: ${{ secrets.CLAUDE_OAUTH_TOKEN }}
          # Indirected through env vars to avoid shell-injection (semgrep
          # yaml.github-actions.security.run-shell-injection): never
          # interpolate ${{ github.event... }} directly inside `run:`.
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        id: review
        run: |
          set +e
          node packages/code-reviewer/dist/cli.js review \
            --pr "$PR_NUMBER" \
            --diff-file /tmp/pr.diff \
            --output json \
            --base-branch "$PR_BASE_REF" \
            --branch "$PR_HEAD_REF" \
            --title "$PR_TITLE" \
            > /tmp/review.json
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          # Extract verdict for the next steps.
          VERDICT=$(node -e "console.log(JSON.parse(require('fs').readFileSync('/tmp/review.json','utf-8')).verdict)")
          echo "verdict=$VERDICT" >> "$GITHUB_OUTPUT"

      - name: Render review comment
        id: render
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          VERDICT: ${{ steps.review.outputs.verdict }}
        run: |
          node packages/code-reviewer/dist/cli.js review \
            --pr "$PR_NUMBER" \
            --diff-file /tmp/pr.diff \
            --output text \
            --base-branch "$PR_BASE_REF" \
            --branch "$PR_HEAD_REF" \
            --title "$PR_TITLE" \
            --no-llm \
            > /tmp/review.txt || true
          # Build a body file we can pass to gh.
          {
            echo "<!-- caia-code-reviewer -->"
            echo "## :robot: Code Reviewer (@chiefaia/code-reviewer)"
            echo ""
            echo "**Verdict:** \`$VERDICT\`"
            echo ""
            echo "Sibling: \`@chiefaia/critic\` (security/regression/cost — also blocking) and \`@chiefaia/reviewer\` (advisory craftsmanship — non-blocking)."
            echo ""
            echo "<details><summary>Full review</summary>"
            echo ""
            echo '```'
            cat /tmp/review.txt
            echo '```'
            echo ""
            echo "</details>"
          } > /tmp/comment.md

      - name: Post review verdict comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr comment "$PR_NUMBER" --body-file /tmp/comment.md

      - name: Submit PR review (approve / request-changes)
        # GitHub disallows reviews where the authenticated token user equals
        # the PR author with "Can not approve your own pull request" (or the
        # equivalent "request changes" message). This happens whenever the
        # autonomous-loop pipeline opens PRs as the GITHUB_TOKEN identity
        # (`github-actions[bot]`). When that specific error fires we
        # gracefully degrade: the verdict has already been posted as a
        # regular PR comment in the prior step, and we exit 0 here so the
        # required `Code Reviewer (blocking)` check still reflects the LLM
        # verdict. Other failures still propagate normally. Identity-based
        # pre-detection (e.g. `gh api user`) was tried first but doesn't
        # work for GITHUB_TOKEN installation tokens — the /user endpoint
        # 404s — so we rely on the well-defined GitHub error message
        # instead. The `Fail job on request-changes` step below preserves
        # the red-on-request-changes semantics regardless of which path
        # this step took.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          VERDICT: ${{ steps.review.outputs.verdict }}
        run: |
          set +e
          if [ "$VERDICT" = "request-changes" ]; then
            OUTPUT=$(gh pr review "$PR_NUMBER" \
              --request-changes \
              --body "Code-Reviewer requests changes. See the verdict comment above." 2>&1)
            RC=$?
          else
            OUTPUT=$(gh pr review "$PR_NUMBER" \
              --approve \
              --body "Code-Reviewer approves. See the verdict comment above." 2>&1)
            RC=$?
          fi
          set -e
          echo "$OUTPUT"
          if [ $RC -eq 0 ]; then
            exit 0
          fi
          # Self-review rejection — degrade to comment-only and exit 0. The
          # verdict comment was already posted in the prior step, and the
          # required-check status remains correct because the
          # `Fail job on request-changes` step still fires for
          # request-changes verdicts.
          if echo "$OUTPUT" | grep -qE "Can not (approve|request changes on) your own pull request"; then
            echo "::notice::Code Reviewer: GitHub rejected the review submission as a self-review (PR author matches GH_TOKEN identity). Verdict was posted as a regular PR comment instead."
            {
              echo "### Code Reviewer self-approval skip"
              echo ""
              echo "GitHub rejected the review submission as a self-review. The LLM verdict was posted as a regular PR comment, and this job's exit code reflects the verdict (approve/comment -> green, request-changes -> red via the trailing fail step)."
              echo ""
              echo "GitHub error: \`$(printf '%s' "$OUTPUT" | tr '\n' ' ' | head -c 200)\`"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          # Any other failure — propagate.
          exit $RC

      - name: Fail job on request-changes (blocks merge)
        if: steps.review.outputs.verdict == 'request-changes'
        run: |
          echo "::error::Code Reviewer requested changes — see PR comment for findings."
          exit 1
