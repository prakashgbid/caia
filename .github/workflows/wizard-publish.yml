# wizard-publish — build + push the chiefaia-wizard image to GHCR.
#
# Trigger: push to develop that touches the wizard or one of its
# workspace deps. V1 does NOT auto-rollout to the cluster — operators
# run `kubectl set image` (see infra/wizard/README.md).
#
# Tags published on every successful build:
#   - ghcr.io/prakashgbid/chiefaia-wizard:develop      (floating)
#   - ghcr.io/prakashgbid/chiefaia-wizard:develop-<sha-short>
#
# Build cache: BuildKit + GH-Actions cache backend.

name: wizard-publish

on:
  push:
    branches: [develop]
    paths:
      - 'apps/wizard/**'
      - 'packages/ui/**'
      - 'packages/billing/**'
      - 'packages/state-machine/**'
      - 'packages/onboarding/**'
      - 'packages/grand-idea/**'
      - 'packages/interviewer/**'
      - 'packages/info-architect/**'
      - 'packages/business-proposal-generator/**'
      - 'packages/design-ingest/**'
      - 'packages/atlas-ui/**'
      - 'packages/atlas-prompt-router/**'
      - 'packages/event-bus-nats/**'
      - 'packages/event-bus-internal/**'
      - 'packages/events/**'
      - 'packages/events-taxonomy-internal/**'
      - 'packages/tracing/**'
      - 'packages/secrets-adapter/**'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/wizard-publish.yml'
  workflow_dispatch: {}

concurrency:
  group: wizard-publish-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: prakashgbid/chiefaia-wizard

jobs:
  build-and-push:
    name: build + push
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set short SHA
        id: meta
        run: |
          echo "sha_short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/wizard/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:develop
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:develop-${{ steps.meta.outputs.sha_short }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha,scope=wizard
          cache-to: type=gha,scope=wizard,mode=max
          provenance: false
          labels: |
            org.opencontainers.image.title=chiefaia-wizard
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=UNLICENSED

      - name: Summary
        run: |
          {
            echo "### chiefaia-wizard image published"
            echo ""
            echo "- \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:develop\`"
            echo "- \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:develop-${{ steps.meta.outputs.sha_short }}\`"
            echo "- \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest\`"
            echo ""
            echo "Rollout (manual in V1):"
            echo ""
            echo '```'
            echo "kubectl -n chiefaia set image deployment/chiefaia-wizard \\"
            echo "  wizard=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:develop-${{ steps.meta.outputs.sha_short }}"
            echo "kubectl rollout status deployment/chiefaia-wizard -n chiefaia --timeout=120s"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
