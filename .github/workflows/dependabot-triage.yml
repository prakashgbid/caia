name: dependabot-triage

# Weekly dependabot DIRTY PR triage — fires Mondays at 13:00 UTC
# (06:00 PT in summer / 05:00 PT in winter). Inventories every open
# dependabot PR with mergeStateStatus = DIRTY by ecosystem (npm / pip /
# docker / github-actions / etc.) and posts a tracking issue tagged
# `dependabot-triage`.
#
# Per failure mode #11 in the Steward Gatekeeper (architecture doc
# §3.11). Does NOT auto-rebase. The right path for dependabot DIRTY
# is `@dependabot rebase` on each PR — this workflow just surfaces the
# queue so the operator (or a future Curator/Mentor pass) can prioritise.
#
# Reference: agent/memory/steward_gatekeeper_directive.md (mode 11).

on:
  schedule:
    # Mondays 13:00 UTC ≈ 06:00 PT (summer) / 05:00 PT (winter).
    - cron: '0 13 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: dependabot-triage
  cancel-in-progress: false

jobs:
  triage:
    name: Build dependabot triage report
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.15.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies (steward-analyzers + deps only)
        run: |
          pnpm install --filter @chiefaia/steward-analyzers... --frozen-lockfile

      - name: Build steward-analyzers
        run: pnpm --filter @chiefaia/steward-analyzers build

      - name: Ensure dependabot-triage label exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh label list --limit 200 --json name --jq '.[].name' | grep -qx 'dependabot-triage'; then
            gh label create dependabot-triage \
              --color 'F0E68C' \
              --description 'Weekly dependabot DIRTY triage — opened by .github/workflows/dependabot-triage.yml' \
              || true
          fi

      - name: Build triage report
        id: report
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/triage
          DATE=$(date -u +%Y-%m-%d)

          # Pull all open dependabot PRs with the fields we need.
          gh pr list \
            --state open \
            --author 'app/dependabot' \
            --limit 200 \
            --json number,title,headRefName,updatedAt,mergeStateStatus,labels \
            > /tmp/triage/raw.json

          # Write the analyzer driver to a .mjs file (top-level await + ESM imports
          # require module mode; node CLI heredoc without --input-type=module would reject).
          cat > /tmp/triage/render.mjs <<'NODE_SCRIPT'
          import fs from 'node:fs';
          const raw = JSON.parse(fs.readFileSync('/tmp/triage/raw.json', 'utf8'));
          const analyzersPath = process.argv[2];
          const { checkDependabotTriage, groupDependabotByEcosystem } = await import(analyzersPath);

          function inferEcosystem(branch) {
            const m = branch.match(/dependabot\/([^/]+)\//);
            if (!m) return 'unknown';
            return m[1];
          }

          const prs = raw.map((pr) => ({
            number: pr.number,
            title: pr.title,
            branch: pr.headRefName,
            updatedAt: pr.updatedAt,
            mergeStateStatus: pr.mergeStateStatus,
            ecosystem: inferEcosystem(pr.headRefName),
          }));

          const findings = checkDependabotTriage({ prs });
          const grouped = groupDependabotByEcosystem(findings);

          const lines = [];
          const today = new Date().toISOString().slice(0, 10);
          lines.push(`# Dependabot Triage — ${today}`);
          lines.push('');
          lines.push(`_Generated by \`.github/workflows/dependabot-triage.yml\` from ${prs.length} open dependabot PR(s)._`);
          lines.push('');

          if (findings.length === 0) {
            lines.push('## ✓ No DIRTY dependabot PRs older than 7 days. Triage queue is empty.');
            lines.push('');
          } else {
            lines.push(`## ${findings.length} DIRTY dependabot PR(s) past warn threshold (7d)`);
            lines.push('');
            for (const eco of Object.keys(grouped).sort()) {
              const items = grouped[eco];
              lines.push(`### ${eco} (${items.length})`);
              lines.push('');
              for (const f of items) {
                const ageDays = f.context?.ageDays ?? '?';
                const sev = f.severity;
                const num = f.context?.prNumber;
                lines.push(`- [#${num}](../../pull/${num}) (${sev}) idle ${ageDays}d — comment \`@dependabot rebase\` or close-and-reopen`);
              }
              lines.push('');
            }
          }

          lines.push('---');
          lines.push('');
          lines.push('Reference: `agent/memory/steward_gatekeeper_directive.md` (mode 11), `~/Documents/projects/reports/dependabot-dirty-prs-2026-05-03.md`.');
          lines.push('');

          process.stdout.write(lines.join('\n'));
          NODE_SCRIPT

          node /tmp/triage/render.mjs "$(pwd)/packages/steward-analyzers/dist/index.js" > /tmp/triage/report.md

          cat /tmp/triage/report.md

      - name: Open or update tracking issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          DATE=$(date -u +%Y-%m-%d)
          TITLE="Dependabot Triage — ${DATE}"
          BODY=$(cat /tmp/triage/report.md)

          # Find an existing issue with the same title (this week's report).
          EXISTING=$(gh issue list \
            --label dependabot-triage \
            --state open \
            --search "in:title \"${TITLE}\"" \
            --json number --jq '.[0].number' || true)

          if [[ -n "${EXISTING}" ]]; then
            echo "→ updating existing issue #${EXISTING}"
            gh issue edit "${EXISTING}" --body "${BODY}"
          else
            echo "→ opening new issue"
            gh issue create \
              --title "${TITLE}" \
              --body "${BODY}" \
              --label dependabot-triage
          fi
