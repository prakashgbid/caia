name: hygiene-report

# Daily hygiene report — fires at 17:00 UTC (10:00 PT in summer, 09:00 PT
# in winter). Scans the repo for git hygiene violations and opens (or
# updates) a tracking issue tagged `git-hygiene`.
#
# What it flags:
#   1. Branches >24h old with no open PR (excluding main, develop,
#      backup/*, release/*).
#   2. Open PRs with no commit activity in the last 48h.
#   3. Branches >7 days old (any state).
#   4. Steward hygiene-daily checks (failure modes 4, 5, 6 per
#      `agent/memory/steward_gatekeeper_directive.md`):
#      stash count, worktree count, orphan branches without PR.
#
# Sections 1-3 are the original hygiene scan. Section 4 is the Steward
# Phase-2c extension (PR #297). Stashes are still out-of-scope at the CI
# layer for sections 1-3 (they're client-side); the Steward analyzer
# section *is* CI-visible and reports stash count = 0 on every clean
# CI runner.
#
# Reference: feedback_git_flow_enforced.md, caia/docs/git-flow.md.

on:
  schedule:
    # 17:00 UTC daily ≈ 10:00 PT (summer) / 09:00 PT (winter).
    - cron: '0 17 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: hygiene-report
  cancel-in-progress: false

jobs:
  report:
    name: Build daily hygiene report
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch all branches
        run: |
          git fetch origin --prune

      - name: Ensure git-hygiene label exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh label list --limit 200 --json name --jq '.[].name' | grep -qx 'git-hygiene'; then
            gh label create git-hygiene \
              --color 'F9D0C4' \
              --description 'Daily git hygiene report — opened by .github/workflows/hygiene-report.yml' \
              || true
          fi

      - name: Build report
        id: report
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          NOW=$(date -u +%s)
          DAY=86400
          THRESH_NEW=$((DAY))           # 24 hours
          THRESH_STALE=$((DAY * 7))     # 7 days
          THRESH_PR_IDLE=$((DAY * 2))   # 48 hours

          mkdir -p /tmp/hygiene
          echo "# Git Hygiene — $(date -u +%Y-%m-%d)" > /tmp/hygiene/report.md
          echo >> /tmp/hygiene/report.md
          echo "_Generated by \`.github/workflows/hygiene-report.yml\` at $(date -u +'%Y-%m-%dT%H:%M:%SZ')._" >> /tmp/hygiene/report.md
          echo >> /tmp/hygiene/report.md

          # --- 1. Branches >24h old without open PR ---
          echo "## 1. Branches >24h old without an open PR" >> /tmp/hygiene/report.md
          echo >> /tmp/hygiene/report.md

          # branches with open PR (any base).
          OPEN_PR_BRANCHES=$(gh pr list --state open --limit 500 --json headRefName --jq '.[].headRefName' | sort -u || true)
          declare -A HAS_PR
          while IFS= read -r b; do
            [[ -n "${b}" ]] && HAS_PR["${b}"]=1
          done <<< "${OPEN_PR_BRANCHES}"

          ANY=0
          while IFS=$'\t' read -r ref ts; do
            short=${ref#origin/}
            case "${short}" in
              main|develop|HEAD|backup/*|release/*|dependabot/*) continue ;;
            esac
            [[ -n "${HAS_PR[${short}]:-}" ]] && continue
            age=$(( NOW - ts ))
            if (( age > THRESH_NEW )); then
              age_h=$(( age / 3600 ))
              echo "- \`${short}\` — ${age_h}h old, **no open PR**" >> /tmp/hygiene/report.md
              ANY=1
            fi
          done < <(git for-each-ref refs/remotes/origin --format='%(refname:short)%09%(committerdate:unix)')
          if (( ANY == 0 )); then
            echo "_(none — clean)_" >> /tmp/hygiene/report.md
          fi
          echo >> /tmp/hygiene/report.md

          # --- 2. Open PRs idle >48h ---
          echo "## 2. Open PRs with no activity in 48h" >> /tmp/hygiene/report.md
          echo >> /tmp/hygiene/report.md
          ANY=0
          gh pr list --state open --limit 500 --json number,title,headRefName,updatedAt,isDraft \
            --jq '.[] | "\(.number)\t\(.title)\t\(.headRefName)\t\(.updatedAt)\t\(.isDraft)"' \
            | while IFS=$'\t' read -r num title head updated draft; do
              upd_ts=$(date -d "${updated}" -u +%s 2>/dev/null || python3 -c "import datetime,sys; print(int(datetime.datetime.fromisoformat(sys.argv[1].replace('Z','+00:00')).timestamp()))" "${updated}")
              age=$(( NOW - upd_ts ))
              if (( age > THRESH_PR_IDLE )); then
                age_h=$(( age / 3600 ))
                draft_tag=""
                [[ "${draft}" == "true" ]] && draft_tag=" [draft]"
                echo "- #${num}${draft_tag} \`${head}\` — ${age_h}h idle — ${title}" >> /tmp/hygiene/report.md
                echo "::notice::idle PR ${num}"
              fi
            done || true
          if ! grep -q '^- #' /tmp/hygiene/report.md.section2 2>/dev/null; then
            tail -1 /tmp/hygiene/report.md | grep -q '^- #' || echo "_(none — clean)_" >> /tmp/hygiene/report.md
          fi
          echo >> /tmp/hygiene/report.md

          # --- 3. Branches >7 days old (any state) ---
          echo "## 3. Branches >7 days old" >> /tmp/hygiene/report.md
          echo >> /tmp/hygiene/report.md
          ANY=0
          while IFS=$'\t' read -r ref ts; do
            short=${ref#origin/}
            case "${short}" in
              main|develop|HEAD|backup/*|release/*) continue ;;
            esac
            age=$(( NOW - ts ))
            if (( age > THRESH_STALE )); then
              age_d=$(( age / DAY ))
              echo "- \`${short}\` — ${age_d}d old" >> /tmp/hygiene/report.md
              ANY=1
            fi
          done < <(git for-each-ref refs/remotes/origin --format='%(refname:short)%09%(committerdate:unix)')
          if (( ANY == 0 )); then
            echo "_(none — clean)_" >> /tmp/hygiene/report.md
          fi
          echo >> /tmp/hygiene/report.md

          echo "---" >> /tmp/hygiene/report.md
          echo >> /tmp/hygiene/report.md
          echo "Reference: \`caia/docs/git-flow.md\` · \`feedback_git_flow_enforced.md\`" >> /tmp/hygiene/report.md
          echo >> /tmp/hygiene/report.md
          echo "Triage with: \`pnpm flow status\` (current branch), \`pnpm flow ship\` (close green PRs), \`pnpm flow archive <reason>\` (preserve to backup/)." >> /tmp/hygiene/report.md

          cat /tmp/hygiene/report.md

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9.15.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies (steward-analyzers + deps only)
        run: |
          # Limit install scope to keep the daily run fast — only what
          # the steward-analyzers package needs to build + run.
          pnpm install --filter @chiefaia/steward-analyzers... --frozen-lockfile

      - name: Build steward-analyzers
        run: pnpm --filter @chiefaia/steward-analyzers build

      - name: Append Steward hygiene-daily findings
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          OUT=$(node packages/steward-analyzers/bin/steward-gatekeeper.mjs hygiene-daily 2>&1)
          STEWARD_EC=$?
          set -e

          {
            echo
            echo "## 4. Steward hygiene-daily checks"
            echo
            echo "_Failure modes 4 (stash), 5 (orphan branches), 6 (worktree count) per \`agent/memory/steward_gatekeeper_directive.md\`._"
            echo
            echo '```'
            echo "${OUT}"
            echo '```'
            echo
            if [ "${STEWARD_EC}" -eq 0 ]; then
              echo "_Steward CLI exit code: 0 (no block findings)._"
            else
              echo "_Steward CLI exit code: ${STEWARD_EC} — high/block-severity findings present; review above._"
            fi
          } >> /tmp/hygiene/report.md

      - name: Open or update tracking issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          DATE=$(date -u +%Y-%m-%d)
          TITLE="Git Hygiene — ${DATE}"
          BODY=$(cat /tmp/hygiene/report.md)

          # Find an existing issue with the same title (today's report).
          EXISTING=$(gh issue list \
            --label git-hygiene \
            --state open \
            --search "in:title \"${TITLE}\"" \
            --json number --jq '.[0].number' || true)

          if [[ -n "${EXISTING}" ]]; then
            echo "→ updating existing issue #${EXISTING}"
            gh issue edit "${EXISTING}" --body "${BODY}"
          else
            echo "→ opening new issue"
            gh issue create \
              --title "${TITLE}" \
              --body "${BODY}" \
              --label git-hygiene
          fi
