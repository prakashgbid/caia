name: Secrets Scan

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read
  security-events: write
  pull-requests: read

jobs:
  secrets-scan:
    name: Secret detection gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Pillar 9-a: gitleaks via official action
      - name: gitleaks — full repo scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-path: .gitleaks.toml

      # Pillar 9-b: trufflehog verified-only on PR diff
      - name: trufflehog — verified secrets on diff
        run: |
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh \
            | sh -s -- -b /usr/local/bin v3.95.2
          trufflehog git file://. --since-commit ${{ github.event.before || 'HEAD~1' }} \
            --only-verified --fail --no-update

      # Pillar 5: bundle-bake detector — scan built output for secrets
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        # version is read from packageManager field in package.json

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Bundle-bake detector — scan build output
        run: |
          BUILD_DIRS="dist out .next/static public"
          FOUND=0
          for dir in $BUILD_DIRS; do
            if [ -d "$dir" ]; then
              echo "Scanning $dir..."
              gitleaks detect --source "$dir" \
                --config .gitleaks.toml \
                --no-banner --redact --exit-code 1 || FOUND=1
            fi
          done
          if [ $FOUND -ne 0 ]; then
            echo "::error::Secret baked into build output — fix before merge"
            exit 1
          fi
          echo "Bundle-bake scan clean."

      # Pillar 12: supply-chain gate
      - name: Supply-chain audit (pnpm audit)
        run: pnpm audit --prod --audit-level high
        continue-on-error: true

      - name: Supply-chain audit (socket, if available)
        continue-on-error: true
        run: |
          if command -v socket &>/dev/null; then
            socket scan --strict
          else
            echo "socket CLI not installed — skipping (install via: npm i -g @socketsecurity/cli)"
          fi
