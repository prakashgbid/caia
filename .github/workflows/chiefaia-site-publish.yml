# Publish the chiefaia-site container image to GHCR on every push to
# develop that touches the app, its Dockerfile, its workspace deps, or
# this workflow itself. Two tags per build:
#
#   ghcr.io/prakashgbid/chiefaia-site:latest
#   ghcr.io/prakashgbid/chiefaia-site:develop-<short-sha>
#
# The Deployment in infra/chiefaia-site/10-deployment.yaml pins
# `:latest` by default; operators can switch to a `:develop-<sha>` pin
# for repeatable rollouts.
#
# Reuse-first (ADR-065): mirrors the conventions the chiefaia-dashboard
# publish workflow will land with (A1+A2 in parallel). Same trigger
# shape, same registry, same tag scheme, same buildx config.
name: chiefaia-site / publish image

on:
  push:
    branches: [develop]
    paths:
      - "apps/chiefaia-site/**"
      - "packages/ui/**"
      - "packages/tracing/**"
      - ".dockerignore"
      - ".github/workflows/chiefaia-site-publish.yml"
  workflow_dispatch:
    inputs:
      tag_override:
        description: "Optional tag suffix (in addition to latest + develop-<sha>)"
        required: false
        default: ""

concurrency:
  group: chiefaia-site-publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build & push chiefaia-site image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      IMAGE: ghcr.io/prakashgbid/chiefaia-site
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute short SHA
        id: sha
        run: echo "short=$(git rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          tags="${IMAGE}:latest"
          tags="${tags},${IMAGE}:develop-${{ steps.sha.outputs.short }}"
          if [ -n "${{ github.event.inputs.tag_override }}" ]; then
            tags="${tags},${IMAGE}:${{ github.event.inputs.tag_override }}"
          fi
          echo "tags=${tags}" >> "$GITHUB_OUTPUT"

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/chiefaia-site/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=chiefaia-site
          cache-to: type=gha,mode=max,scope=chiefaia-site
          provenance: false
          # OCI image labels — surfaced in `docker inspect` + GHCR UI.
          labels: |
            org.opencontainers.image.title=chiefaia-site
            org.opencontainers.image.description=ChiefAIA marketing site (Next.js 15)
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.licenses=UNLICENSED

      - name: Image digest
        run: |
          echo "Image pushed:"
          echo "  ${IMAGE}:latest"
          echo "  ${IMAGE}:develop-${{ steps.sha.outputs.short }}"
