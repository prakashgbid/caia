name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --prefer-offline --no-audit --no-fund

      - name: Build
        run: npm run build

      # ── Integrity gate (fail deploy if images violate rules) ──────────────────
      - name: Integrity scan
        run: npm run integrity

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # SITE_PROJECT_NAME is replaced by new-site script with the slug.
          # Set it manually here if cloning the template directly.
          projectName: SITE_SLUG
          directory: out
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
