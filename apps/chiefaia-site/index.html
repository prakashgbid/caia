  <head>
    <meta charset="utf-8" />

    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }
      body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, sans-serif;
        background:
          radial-gradient(60% 50% at 50% 0%, rgba(99, 102, 241, 0.10) 0%, transparent 60%),
          radial-gradient(50% 40% at 100% 100%, rgba(139, 92, 246, 0.08) 0%, transparent 60%),
          #fafafa;
        color: #1a1a1a;
        line-height: 1.55;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      main {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 4rem 1.5rem;
        text-align: center;
      }
      .mark {
        width: 56px;
        height: 56px;
        border-radius: 14px;
        background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: 600;
        font-size: 28px;
        letter-spacing: -0.02em;
        margin-bottom: 2rem;
        box-shadow: 0 8px 32px -8px rgba(99, 102, 241, 0.45);
      }
      h1 {
        font-size: clamp(2rem, 5vw, 2.75rem);
        font-weight: 600;
        letter-spacing: -0.02em;
        margin: 0 0 0.5rem;
        color: #0f172a;
      }
      .domain {
        font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
        font-size: 0.95rem;
        color: #64748b;
        margin: 0 0 2rem;
      }
      .pitch {
        max-width: 36rem;
        font-size: 1.125rem;
        color: #334155;
        margin: 0 0 2.5rem;
      }
      .status {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.5rem 1rem;
        border-radius: 999px;
        background: rgba(99, 102, 241, 0.08);
        color: #4f46e5;
        font-size: 0.875rem;
        font-weight: 500;
        letter-spacing: 0.01em;
      }
      .status::before {
        content: "";
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #6366f1;
        animation: pulse 2.4s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50%      { opacity: 0.5; transform: scale(0.85); }
      }
      footer {
        padding: 2rem 1.5rem;
        text-align: center;
        font-size: 0.8125rem;
        color: #94a3b8;
      }
      @media (prefers-color-scheme: dark) {
        body {
          background:
            radial-gradient(60% 50% at 50% 0%, rgba(99, 102, 241, 0.18) 0%, transparent 60%),
            radial-gradient(50% 40% at 100% 100%, rgba(139, 92, 246, 0.12) 0%, transparent 60%),
            #0a0a0a;
          color: #f1f5f9;
        }
        h1 { color: #f8fafc; }
        .domain { color: #94a3b8; }
        .pitch { color: #cbd5e1; }
        .status { background: rgba(99, 102, 241, 0.15); color: #a5b4fc; }
        footer { color: #64748b; }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark" aria-hidden="true">C</div>
      <h1>Chief AI Agent</h1>
      <p class="domain">chiefaia.com</p>
      <p class="pitch">
        Building a fully autonomous, AI-driven platform that turns ideas into
        production-ready websites.
      </p>
      <span class="status">Coming soon</span>
    </main>
    <footer>&copy; 2026 Chief AI Agent</footer>
  </body>
</html>
