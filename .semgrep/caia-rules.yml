# caia/.semgrep/caia-rules.yml
#
# Project-specific Semgrep rules layered on top of the `auto` rule set.
# Run via: semgrep ci --config=auto --config=.semgrep/caia-rules.yml
#
# Reference: docs/evidence-gate.md, third-party-caia-paper-analysis-2026-04-29.md §C.2.

rules:
  # ─── No --admin merges (bypasses required status checks) ───────────────
  #
  # TRUE-ZERO BUILD-PHASE CARVE-OUT (standing rule 2026-05-13):
  # During the CAIA build phase, admin-squash-merge is permitted when the
  # standard `pnpm flow ship` path is blocked by PAT-scope limits or
  # unrelated pre-existing dev-broken checks. The mechanical gate has two
  # parts:
  #   1. The orchestrator-maintained marker file `.caia/build-phase-active`
  #      MUST exist at repo root. Absence ⇒ exception does not apply.
  #   2. The offending line (or an adjacent line in the same statement)
  #      MUST carry the comment marker `TRUE-ZERO-MERGE` (e.g.
  #      `gh pr merge 123 --squash --admin --delete-branch  # TRUE-ZERO-MERGE`).
  # The `pattern-not-regex` below implements the line-level marker check;
  # the marker-file check is enforced by humans/agents per AGENTS.md and
  # by the audit trail (squash-commit must carry `[True-Zero admin-merge]`).
  - id: caia-no-admin-merge
    message: |
      `gh pr merge --admin` bypasses required status checks. The CAIA git-flow
      forbids this by default — every PR must satisfy the deterministic-evidence
      gate.

      TRUE-ZERO carve-out: during the build phase (marker file
      `.caia/build-phase-active` present at repo root), admin-squash-merge is
      permitted when `pnpm flow ship` is blocked by PAT scope or unrelated
      pre-existing dev-broken checks. To exercise the carve-out, add the
      inline marker `# TRUE-ZERO-MERGE` (or `// TRUE-ZERO-MERGE` in JS/TS)
      on the same line as the `gh pr merge --admin` call, and tag the
      squash-commit with `[True-Zero admin-merge]`. See AGENTS.md "Gotchas"
      section and standing rule:
      `~/Documents/projects/agent-memory/standing_rule_true_zero_before_new_pr_2026-05-13.md`.

      Outside the build phase: remove the `--admin` flag and let CI run.
    severity: ERROR
    languages: [generic]
    paths:
      include:
        - "scripts/**"
        - ".github/**"
        - "**/*.sh"
        - "**/*.ts"
        - "**/*.js"
        - "**/*.yml"
        - "**/*.yaml"
        - "docs/**"
        - "**/*.md"
      exclude:
        - "**/*.test.ts"
        - "**/*.spec.ts"
        - "**/__visual_baselines__/**"
        - ".semgrep/**"
        - "AGENTS.md"
        - "docs/evidence-gate.md"
        - "docs/capability-broker.md"
        - "docs/mcp-security.md"
        - "docs/prompt-injection-defense.md"
        - "docs/spend-guard.md"
    patterns:
      # Single consolidated pattern: matches `gh pr merge` with `--admin`
      # appearing anywhere in the argv. `$...A` / `$...B` are zero-or-more
      # token metavariables, so the match span covers the entire command
      # including any trailing-comment marker — which is what the
      # `pattern-not-regex` below relies on.
      - pattern: gh pr merge $...A --admin $...B
      # TRUE-ZERO carve-out: a `TRUE-ZERO-MERGE` marker (in a // or # comment
      # on the same line/statement) downgrades the match to a non-finding.
      # Operators MUST also ensure `.caia/build-phase-active` exists at repo
      # root before using this carve-out (humans/agents enforce; semgrep can
      # only see the file contents, not adjacent sibling files).
      - pattern-not-regex: 'TRUE-ZERO-MERGE'


  # ─── No git push --force outside backup/* branches ────────────────────
  - id: caia-no-force-push-non-backup
    message: |
      `git push --force` rewrites shared history. The CAIA git-flow only
      permits force-push on `backup/*` branches (preservation-only).
      Use `--force-with-lease` on a feature branch if you must, but the
      target ref must be inside the `backup/` namespace.
    severity: ERROR
    languages: [generic]
    paths:
      include:
        - "scripts/**"
        - ".github/**"
        - "**/*.sh"
        - "docs/**"
      exclude:
        - "**/*.test.ts"
        - "**/*.spec.ts"
        - "scripts/caia-flow.sh"          # the wrapper itself enforces the rule
        - ".semgrep/**"
        - "AGENTS.md"
        - "docs/evidence-gate.md"
        - "docs/git-flow.md"
        - "docs/capability-broker.md"
        - "docs/mcp-security.md"
        - "docs/prompt-injection-defense.md"
        - "docs/spend-guard.md"
    pattern-either:
      - pattern: git push --force origin
      - pattern: git push -f origin
      - pattern: git push --force-with-lease origin main
      - pattern: git push --force-with-lease origin develop

  # ─── No hardcoded vault keys (CAIA secrets discipline) ─────────────────
  # Catches the *names* of vault keys appearing as raw values in source —
  # gitleaks catches the value shape; this rule catches the cleartext-key
  # leakage pattern (e.g. someone pasting a vault key into a fixture).
  - id: caia-no-hardcoded-vault-keys
    message: |
      A CAIA vault key name appears alongside what looks like a literal
      secret value. Vault keys must be resolved at runtime via
      `scripts/get-vault-secret.sh` or the orchestrator's vault adapter,
      never hardcoded in source.
    severity: ERROR
    languages: [generic]
    paths:
      exclude:
        - "**/*.test.ts"
        - "**/*.spec.ts"
        - "**/__fixtures__/**"
        - "**/__visual_baselines__/**"
        - "**/node_modules/**"
        - "**/dist/**"
        - "**/.next/**"
        - ".semgrep/**"
        - "docs/evidence-gate.md"
        - "docs/legacy-*/**"
    pattern-regex: '(ANTHROPIC_API_KEY|CLAUDE_SUBSCRIPTION_TOKEN|CF_API_TOKEN|CLOUDFLARE_API_TOKEN|GITHUB_PAT|GH_TOKEN|SUPABASE_SERVICE_KEY|VAULT_TOKEN)\s*[:=]\s*["''](?!process\.env|\$\{|<%|\$\(|\${{)([A-Za-z0-9_\-]{20,})["'']'

  # ─── No direct PAT usage — must go through capability broker ──────────
  - id: caia-no-direct-pat-in-source
    message: |
      Direct use of a GitHub PAT or `gh auth token` outside scripts/.
      Privileged tokens must be brokered through the capability broker
      (capability-broker package, per analysis §C.1) so every privileged
      action is logged in the irreversible-action ledger.
    severity: WARNING
    languages: [generic]
    paths:
      include:
        - "apps/**"
        - "packages/**"
      exclude:
        - "**/*.test.ts"
        - "**/*.spec.ts"
        - "**/__fixtures__/**"
        - "**/node_modules/**"
        - "**/dist/**"
        - "**/.next/**"
        - "packages/capability-broker/**"
    pattern-either:
      - pattern: process.env.GITHUB_PAT
      - pattern: process.env.GH_TOKEN
      - pattern-regex: 'execSync\(\s*["''`]gh auth token'
      - pattern-regex: 'spawn\(\s*["''`]gh["''`].*"auth".*"token"'

  # ─── Forbid writes to mcp.json / .mcp.json (CVE-2025-54135) ───────────
  # Tool-result-driven write to MCP registration would let a hostile MCP
  # server install a sibling. Per analysis §C.3.
  - id: caia-no-mcp-json-write
    message: |
      Writing to mcp.json / .mcp.json / .cursor/mcp.json from agent code
      can be exploited by a hostile MCP server that returns crafted
      tool-call results (CurXecute, CVE-2025-54135). Route through the
      capability broker's deny-list.
    severity: ERROR
    languages: [generic]
    paths:
      include:
        - "apps/**"
        - "packages/**"
      exclude:
        - "**/*.test.ts"
        - "**/*.spec.ts"
        - "**/node_modules/**"
        - "**/dist/**"
    pattern-either:
      - pattern-regex: 'fs\.(write|writeFile|writeFileSync|append|appendFile|appendFileSync)[^,]*[,\s]*["''`][^"''`]*\.?mcp\.json'
      - pattern-regex: 'writeFileSync\(\s*[^,]*\.cursor/mcp\.json'

  # ─── Option E shape — packages must be private ─────────────────────────
  # Standing rule 2026-05-06 (agent_architecture_shape_2026-05-06.md):
  # every @chiefaia/* workspace package MUST have "private": true and MUST
  # NOT be published to public npm. Detects @chiefaia/-scoped package.json
  # files lacking the "private": true field.
  - id: caia-option-e-package-must-be-private
    message: |
      Option E (CAIA-Bonded Skeleton, standing rule 2026-05-06): every
      `@chiefaia/*` workspace package MUST declare `"private": true`.
      This package's package.json declares the @chiefaia scope but is
      missing or has a falsy `private` field, which would make it
      publishable to public npm — explicitly forbidden until a
      productisation re-eval trigger fires.

      Fix: add `"private": true` to package.json (top level).

      Reference: agent/memory/agent_architecture_shape_2026-05-06.md
      and AGENTS.md "Architectural conventions" section.
    severity: ERROR
    languages: [json]
    paths:
      include:
        - "packages/**/package.json"
      exclude:
        - "**/node_modules/**"
        - "**/dist/**"
    patterns:
      - pattern: |
          {
            ...,
            "name": "@chiefaia/$NAME",
            ...
          }
      - pattern-not: |
          {
            ...,
            "private": true,
            ...
          }

  # ─── Option E shape — no env-var-based CAIA path construction ──────────
  # Constructing a CAIA path from process.env.HOME / os.homedir() bypasses
  # the parameterised constructor and hard-codes the runtime to the
  # operator's machine layout. The agent must accept a corpusRoot (or
  # equivalent) as a constructor parameter with a CAIA default; runtime
  # path-derivation is the orchestrator's job, not the agent's.
  - id: caia-option-e-no-env-home-caia-path
    message: |
      Option E (CAIA-Bonded Skeleton, standing rule 2026-05-06):
      constructing a CAIA path from `process.env.HOME` / `os.homedir()`
      hard-codes the runtime to the operator's machine layout and bypasses
      the parameterised-constructor contract.

      Fix: accept the path as a constructor parameter with a CAIA default,
      e.g.:
          constructor(opts: { corpusRoot?: string } = {}) {
            this.corpusRoot = opts.corpusRoot
              ?? '~/Documents/projects/caia/agent/memory';
          }
      The runtime resolution to absolute path lives in the orchestrator
      that constructs the agent, not in the agent itself.

      Reference: agent/memory/agent_architecture_shape_2026-05-06.md gate 2
      and AGENTS.md "Architectural conventions" section.
    severity: ERROR
    languages: [generic]
    paths:
      include:
        - "packages/*/src/**/*.ts"
        - "packages/*/src/**/*.tsx"
      exclude:
        - "**/*.test.ts"
        - "**/*.spec.ts"
        - "**/__fixtures__/**"
        - "**/__tests__/**"
        - "**/node_modules/**"
        - "**/dist/**"
    pattern-either:
      - pattern-regex: 'process\.env\.HOME\s*\+\s*["''`]/Documents/projects/caia'
      - pattern-regex: 'os\.homedir\(\)\s*\+\s*["''`]/Documents/projects/caia'
      - pattern-regex: 'homedir\(\)\s*\+\s*["''`]/Documents/projects/caia'
      - pattern-regex: 'join\([^)]*(?:process\.env\.HOME|homedir\(\))[^)]*["''`]Documents["''`]\s*,\s*["''`]projects["''`]\s*,\s*["''`]caia'

  # ─── Option E shape — no hardcoded CAIA path literals in agent code ────
  # CAIA-specific path literals (~/Documents/projects/caia/..., absolute
  # /Users/.../caia/agent/memory, .caia/, agent/memory/, etc.) embedded in
  # agent source files outside of constructor-parameter defaults bypass
  # the parameterised contract. Constructor defaults are allowed; usage
  # inside function bodies is not.
  - id: caia-option-e-no-hardcoded-caia-path-literal
    message: |
      Option E (CAIA-Bonded Skeleton, standing rule 2026-05-06):
      hard-coded CAIA path literal in package source. The standing rule
      requires every CAIA-specific path/topic/registry to be a constructor
      parameter with a CAIA default — NOT a literal sprinkled through
      function bodies.

      Allowed: literal as a constructor-parameter default value, e.g.
          constructor(public corpusRoot: string =
            '~/Documents/projects/caia/agent/memory') {}
      Forbidden: literal anywhere else (function body, top-level constant
      consumed implicitly, helper module, etc.).

      Fix: hoist the literal up to a constructor parameter default and
      thread it through. Tests inject a fixture corpus; production injects
      the CAIA default.

      Reference: agent/memory/agent_architecture_shape_2026-05-06.md gate 2-3
      and AGENTS.md "Architectural conventions" section.
    severity: ERROR
    languages: [generic]
    paths:
      include:
        - "packages/*/src/**/*.ts"
        - "packages/*/src/**/*.tsx"
      exclude:
        - "**/*.test.ts"
        - "**/*.spec.ts"
        - "**/__fixtures__/**"
        - "**/__tests__/**"
        - "**/node_modules/**"
        - "**/dist/**"
        # Constructor-parameter defaults are allowed, but semgrep generic
        # mode can't structurally distinguish; we exclude obvious infra
        # packages where these literals legitimately live as resolved
        # absolute paths in CLI / orchestrator entry-points.
        - "packages/system-prompt-block/**"
    pattern-either:
      - pattern-regex: '["''`]~?/Documents/projects/caia/[^"''`]+["''`]'
      - pattern-regex: '["''`]/Users/[^/"''`]+/Documents/projects/caia/[^"''`]+["''`]'

  # ─── Reuse-first guardrail rules (ADR-065, AGENTS.md > Reuse-first) ───
  #
  # The next five rules enforce the canonical-wrapper convention: every
  # foundational dep (shadcn, Radix, axios, fetch, better-sqlite3) is
  # allowed only inside its wrapper package. Everywhere else, code must
  # consume the wrapper.
  #
  # Defence-in-depth with the `reuse-advisory-blocking` CI gate
  # (`scripts/reuse-check-strict.js`) — the CI gate catches what
  # Semgrep's regex can't (e.g. dynamic imports), and Semgrep catches
  # what the CI gate skips (small diffs, fast feedback).

  - id: caia-no-raw-shadcn-import-outside-ui-package
    message: |
      Raw shadcn primitive imports are only allowed inside `packages/ui/**`.
      Use `@caia/ui` instead. See AGENTS.md > Reuse-first.
    severity: ERROR
    languages: [generic]
    paths:
      include:
        - "apps/**/*.ts"
        - "apps/**/*.tsx"
        - "packages/**/*.ts"
        - "packages/**/*.tsx"
      exclude:
        - "packages/ui/**"
        - "**/*.test.ts"
        - "**/*.test.tsx"
        - "**/*.spec.ts"
        - "**/*.spec.tsx"
        - "**/node_modules/**"
        - "**/dist/**"
        - "**/__fixtures__/**"
    pattern-either:
      - pattern-regex: 'from\s+["'\'']@/components/ui/[a-z-]+["'\'']'
      - pattern-regex: 'from\s+["'\'']\.\./components/ui/[a-z-]+["'\'']'
      - pattern-regex: 'from\s+["'\'']\./components/ui/[a-z-]+["'\'']'

  - id: caia-no-raw-radix-outside-ui-package
    message: |
      Raw `@radix-ui/*` imports are only allowed inside `packages/ui/**`.
      Wrap the primitive in `@caia/ui` and consume from there.
      See AGENTS.md > Reuse-first.
    severity: ERROR
    languages: [generic]
    paths:
      include:
        - "apps/**/*.ts"
        - "apps/**/*.tsx"
        - "packages/**/*.ts"
        - "packages/**/*.tsx"
      exclude:
        - "packages/ui/**"
        - "**/*.test.ts"
        - "**/*.test.tsx"
        - "**/node_modules/**"
        - "**/dist/**"
    pattern-regex: 'from\s+["'\'']@radix-ui/'

  - id: caia-no-inline-tailwind-in-customer-facing-app
    message: |
      Inline Tailwind utility-class strings in customer-facing apps cause
      brand drift. Use a `@caia/ui` component (which encapsulates the
      Tailwind classes) instead. Demote to a WARNING-only rule via the
      `reuse-advisory-escape` label if the use is genuinely one-off.
    severity: WARNING
    languages: [generic]
    paths:
      include:
        - "apps/chiefaia-site/**/*.tsx"
        - "apps/dashboard/**/*.tsx"
      exclude:
        - "packages/ui/**"
        - "**/*.test.tsx"
        - "**/*.spec.tsx"
        - "**/node_modules/**"
        - "**/__visual_baselines__/**"
    pattern-regex: 'className\s*=\s*["'\''][^"'\'']*\b(flex|grid|p-[0-9]|m-[0-9]|text-(sm|lg|xl)|bg-[a-z]+-[0-9]+)\b'

  - id: caia-no-raw-axios-outside-http-client
    message: |
      `axios` is only allowed inside `packages/http-client/**` (the
      canonical HTTP wrapper). Use `@chiefaia/http-client` from any
      other package or app. See AGENTS.md > Reuse-first.
    severity: ERROR
    languages: [generic]
    paths:
      include:
        - "apps/**/*.ts"
        - "apps/**/*.tsx"
        - "packages/**/*.ts"
        - "packages/**/*.tsx"
      exclude:
        - "packages/http-client/**"
        - "**/*.test.ts"
        - "**/*.test.tsx"
        - "**/node_modules/**"
        - "**/dist/**"
    pattern-either:
      - pattern-regex: 'import\s+axios\s+from\s+["'\'']axios["'\'']'
      - pattern-regex: 'import\s+\*\s+as\s+axios\s+from\s+["'\'']axios["'\'']'
      - pattern-regex: 'import\s+\{[^}]+\}\s+from\s+["'\'']axios["'\'']'
      - pattern-regex: 'require\(\s*["'\'']axios["'\'']\s*\)'

  - id: caia-no-raw-better-sqlite3-outside-persistence
    message: |
      `better-sqlite3` is only allowed inside `packages/persistence-*/**`.
      Use `@chiefaia/persistence-sqlite` everywhere else. See AGENTS.md
      > Reuse-first.
    severity: ERROR
    languages: [generic]
    paths:
      include:
        - "apps/**/*.ts"
        - "apps/**/*.tsx"
        - "packages/**/*.ts"
        - "packages/**/*.tsx"
      exclude:
        - "packages/persistence-*/**"
        - "**/*.test.ts"
        - "**/node_modules/**"
        - "**/dist/**"
    pattern-either:
      - pattern-regex: 'import\s+\w+\s+from\s+["'\'']better-sqlite3["'\'']'
      - pattern-regex: 'import\s+\*\s+as\s+\w+\s+from\s+["'\'']better-sqlite3["'\'']'
      - pattern-regex: 'require\(\s*["'\'']better-sqlite3["'\'']\s*\)'
